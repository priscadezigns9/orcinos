<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | The Sovereign Caribbean AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --orca-black: #050505; --orca-white: #ffffff; --orca-blue: #1e3a8a; --sidebar-bg: #f8fafc; }
        body { background: var(--orca-white); color: var(--orca-black); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background: var(--sidebar-bg); border-right: 1px solid #f1f5f9; }
        .chat-input { border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .glass-icon { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-orca { background: var(--orca-black); color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-orca:hover { background: var(--orca-blue); transform: translateY(-1px); }
        .text-orcinos { color: var(--orca-blue); }
        .action-card { transition: all 0.2s; border: 1px solid #f1f5f9; }
        .action-card:hover { border-color: var(--orca-blue); background: #f0f9ff; transform: translateY(-2px); }
        .badge-caribbean { background: linear-gradient(90deg, #1e3a8a, #3b82f6); color: white; }
        select { appearance: none; -webkit-appearance: none; }
    </style>
</head>
<body class="flex">
    <aside class="sidebar w-72 flex flex-col p-6 shrink-0 h-full">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-9 h-9 rounded-xl overflow-hidden glass-icon flex items-center justify-center p-1"><img src="assets/logo.png" class="w-full h-full object-contain"></div>
            <span class="font-black tracking-tighter text-xl text-orcinos uppercase">ORCINOS</span>
        </div>
        <button class="w-full py-3 px-4 rounded-2xl border-2 border-dashed border-gray-200 text-gray-400 text-sm font-bold hover:border-blue-200 hover:text-blue-600 transition-all mb-8">+ New Objective</button>
        
        <div class="flex-1 overflow-y-auto">
            <div class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-5">Active Channels</div>
            <nav class="space-y-2">
                <a href="#" class="flex items-center gap-3 p-3 rounded-xl bg-white border border-gray-100 text-xs font-semibold shadow-sm text-gray-700">
                    <div class="w-2 h-2 rounded-full bg-green-500"></div> WhatsApp Messenger
                </a>
                <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-200 text-xs text-gray-500 transition">
                    <div class="w-2 h-2 rounded-full bg-gray-300"></div> Outlook / Exchange
                </a>
                <a href="#" class="flex items-center gap-3 p-3 rounded-xl hover:bg-gray-200 text-xs text-gray-500 transition">
                    <div class="w-2 h-2 rounded-full bg-gray-300"></div> Google Workspace
                </a>
            </nav>
        </div>

        <div class="mt-auto pt-6 border-t border-gray-100">
            <div class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-5">Neural MCP Hub</div>
            <div class="flex gap-2 mb-8 flex-wrap">
                <div title="Google Workspace" class="w-9 h-9 rounded-xl glass-icon flex items-center justify-center cursor-pointer hover:scale-105 transition">
                    <svg class="w-5 h-5 text-gray-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.92 3.16-1.92 4.16-1.2 1.2-3.08 2.52-6.16 2.52-4.96 0-8.84-4-8.84-8.96s3.88-8.96 8.84-8.96c2.68 0 4.6 1.08 6.04 2.48l2.32-2.32C18.6 1.14 15.84 0 12.48 0 5.64 0 0 5.64 0 12.48s5.64 12.48 12.48 12.48c3.68 0 6.48-1.2 8.68-3.48 2.24-2.24 2.96-5.4 2.96-8.08 0-.68-.04-1.32-.12-1.92h-11.52z"/></svg>

                </div>
                <div title="Outlook Integration" class="w-9 h-9 rounded-xl glass-icon flex items-center justify-center cursor-pointer hover:scale-105 transition">

                </div>
                <div title="Supabase Node" class="w-9 h-9 rounded-xl glass-icon flex items-center justify-center cursor-pointer hover:scale-105 transition">
                    <svg class="w-4 h-4 text-emerald-500" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 12l10 10 10-10L12 2zm0 18l-8-8 8-8 8 8-8 8z"/></svg>
                </div>
            </div>
            <button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md transition-all text-xs font-black uppercase tracking-wider">
                <svg class="w-4 h-4" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.92 3.16-1.92 4.16-1.2 1.2-3.08 2.52-6.16 2.52-4.96 0-8.84-4-8.84-8.96s3.88-8.96 8.84-8.96c2.68 0 4.6 1.08 6.04 2.48l2.32-2.32C18.6 1.14 15.84 0 12.48 0 5.64 0 0 5.64 0 12.48s5.64 12.48 12.48 12.48c3.68 0 6.48-1.2 8.68-3.48 2.24-2.24 2.96-5.4 2.96-8.08 0-.68-.04-1.32-.12-1.92h-11.52z"/></svg>
                Join the Orca Layer
            </button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col bg-white relative">
        <header class="p-5 flex justify-between items-center border-b border-gray-50">
            <div class="flex items-center gap-3">
                <div class="text-[10px] font-black tracking-[0.4em] text-gray-300 uppercase">Marine Protocol</div>
                <div class="px-2 py-0.5 rounded-full badge-caribbean text-[8px] font-black uppercase tracking-widest">Caribbean Context Active</div>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2 bg-gray-50 border border-gray-100 px-3 py-1.5 rounded-xl">
                    <select id="brain-selector" class="bg-transparent text-[10px] font-black tracking-widest text-orcinos focus:outline-none cursor-pointer uppercase">
                        <option value="orca">ORCA (Default)</option>
                        <option value="claude">CLAUDE 3.5</option>
                        <option value="gpt4">GPT-4o</option>
                        <option value="gemini">GEMINI 1.5</option>
                        <option value="deepseek">DEEPSEEK V3</option>
                        <option value="grok">GROK-1</option>
                    </select>
                </div>
                <div class="flex items-center gap-2"><div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div><span class="text-[9px] font-black text-blue-900 uppercase tracking-[0.2em]">NEURAL LINK ACTIVE</span></div>
            </div>
        </header>
        <div class="flex-1 flex flex-col items-center justify-center p-12 overflow-y-auto">
            <div class="w-16 h-16 rounded-[2rem] bg-black flex items-center justify-center shadow-2xl mb-8">
                <img src="assets/logo.png" class="w-10 h-10 brightness-0 invert">
            </div>
            <h1 class="text-3xl font-black text-orcinos uppercase tracking-tighter mb-4">ORCINOS</h1>
            <p class="text-gray-400 text-sm font-medium mb-12 text-center max-w-sm">The Sovereign Intelligence for the Caribbean. WhatsApp & Workspace Integrated.</p>
            
            <div class="grid grid-cols-2 gap-4 w-full max-w-2xl">
                <button class="action-card p-5 rounded-3xl text-left bg-white">
                    <div class="text-green-600 mb-2"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg></div>
                    <div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-1">Direct Connect</div>
                    <div class="text-sm font-bold text-gray-800">Message my WhatsApp</div>
                </button>
                <button class="action-card p-5 rounded-3xl text-left bg-white">
                    <div class="text-blue-600 mb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>
                    <div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-1">Calendar Sync</div>
                    <div class="text-sm font-bold text-gray-800">Plan my Caribbean schedule</div>
                </button>
                <button class="action-card p-5 rounded-3xl text-left bg-white">
                    <div class="text-blue-600 mb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10l4 4v10a2 2 0 01-2 2zM14 4v4h4"/></svg></div>
                    <div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-1">Intelligence</div>
                    <div class="text-sm font-bold text-gray-800">Latest Regional News</div>
                </button>
                <button class="action-card p-5 rounded-3xl text-left bg-white">
                    <div class="text-blue-600 mb-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg></div>
                    <div class="font-black text-[10px] uppercase tracking-widest text-gray-400 mb-1">Exchange Sync</div>
                    <div class="text-sm font-bold text-gray-800">Review my Outlook Inbox</div>
                </button>
            </div>
        </div>
        <div class="p-10"><div class="max-w-3xl mx-auto relative">
                <div class="chat-input rounded-[2rem] bg-white p-5 flex flex-col gap-4">
                    <textarea id="chat-input" placeholder="Message Orcinos..." class="w-full resize-none border-none focus:ring-0 text-gray-800 placeholder-gray-300 min-h-[60px] font-medium"></textarea>
                    <div class="flex justify-between items-center">
                        <div class="flex gap-3">
                            <button class="p-2.5 rounded-xl glass-icon text-gray-400 hover:text-blue-600 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg></button>
                            <button class="p-2.5 rounded-xl glass-icon text-gray-400 hover:text-blue-600 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
                        </div>
                        <button id="send-button" class="btn-orca py-3 px-8 rounded-2xl font-black text-[11px] tracking-[0.2em] flex items-center gap-3 shadow-md">EXECUTE<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg></button>
                    </div>
                </div>
            </div></div>
    </main>
    <script>
        document.getElementById('send-button').addEventListener('click', () => {
            const brain = document.getElementById('brain-selector').value;
            const input = document.getElementById('chat-input').value;
            if (!input) return;
            console.log(`Sending to ${brain}: ${input}`);
            // Logic for backend connector goes here
        });
    </script>
</body>
</html>
