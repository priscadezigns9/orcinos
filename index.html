<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | Sovereign Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --orca-blue: #2563eb; 
            --orca-purple: #7c3aed;
            --sidebar-bg: #f9fafb;
            --chat-space-bg: #1e3a8a;
            --orca-gradient: linear-gradient(135deg, var(--orca-blue) 0%, var(--orca-purple) 100%);
        }
        body { background: white; color: #111827; font-family: 'Inter', sans-serif; height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 16px;
            flex-shrink: 0;
            z-index: 20;
        }

        /* OFFICIAL GEOMETRIC LOGO INTEGRATION */
        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            margin-bottom: 24px;
        }

        .orca-brand-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .orca-brand-icon svg {
            width: 100%;
            height: 100%;
        }

        .wordmark {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: var(--orca-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 8px;
            color: #4b5563;
            font-weight: 500;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 4px;
        }
        .nav-item:hover { background: #f3f4f6; color: #111827; }
        .nav-item.active { background: #eff6ff; color: var(--orca-blue); }

        .chat-space {
            flex-grow: 1;
            background: var(--chat-space-bg);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .message-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message-bubble {
            background: white;
            padding: 24px;
            border-radius: 16px;
            max-width: 85%;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            padding: 24px 40px 40px;
            background: linear-gradient(to top, var(--chat-space-bg) 80%, transparent);
        }

        .input-wrapper {
            background: white;
            border-radius: 16px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
        }

        input {
            flex-grow: 1;
            border: none;
            padding: 12px 0;
            font-size: 16px;
            outline: none;
        }

        .btn-plus {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-plus:hover { background: #e5e7eb; }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .connector-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 16px;
            padding: 32px;
            overflow-y: auto;
        }

        .connector-card {
            border: 1px solid #f3f4f6;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .connector-card:hover { border-color: var(--orca-blue); background: #eff6ff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <div class="orca-brand-icon">
                <!-- SVG Mapped from reference image -->
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 10C35 10 20 20 15 35C12 45 15 55 20 65C25 75 35 85 50 90C65 85 75 75 80 65C85 55 88 45 85 35C80 20 65 10 50 10Z" fill="url(#grad1)"/>
                    <path d="M25 45C30 40 40 38 50 40C60 42 70 45 75 55L50 60L25 45Z" fill="white" fill-opacity="0.9"/>
                    <path d="M45 48C45 48 48 46 50 46C52 46 55 48 55 48C55 48 52 50 50 50C48 50 45 48 45 48Z" fill="#1e3a8a"/>
                    <defs>
                        <linearGradient id="grad1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                            <stop stop-color="#2563eb"/>
                            <stop offset="1" stop-color="#7c3aed"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="wordmark">Orcinos</div>
        </div>

        <div class="nav-item active" onclick="createNewChat()">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            New Sovereign Chat
        </div>

        <div class="mt-8 text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-3">Recent Intelligence</div>
        <div id="chat-history-list">
            <div class="nav-item">
                <svg class="w-4 h-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
                <span class="truncate">Infrastructure Audit</span>
            </div>
        </div>

        <div class="mt-auto">
            <div class="flex items-center justify-between mb-4 px-3">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Connectors</span>
                <div class="btn-plus" onclick="openModal()">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
                </div>
            </div>
            <div id="active-connectors" class="space-y-1"></div>
        </div>
    </div>

    <div class="chat-space">
        <div class="message-container" id="chat-history">
            <div class="message-bubble">
                <h1 class="text-4xl font-black mb-4 tracking-tighter text-slate-900">Protocol Initiated.</h1>
                <p class="text-slate-500 text-lg leading-relaxed">System ready for sovereign Caribbean intelligence and regional node integration. How shall we proceed, Prisca?</p>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="main-input" placeholder="Enter a command..." onkeydown="if(event.key==='Enter') handleSend()">
                <button id="send-btn" onclick="handleSend()" class="p-2 text-slate-300 transition-colors">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="connector-modal">
        <div class="modal-content">
            <div class="p-8 border-b flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-black text-slate-900">Neural Connector Hub</h2>
                    <p class="text-slate-500">Integrate sovereign nodes and third-party workspaces.</p>
                </div>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-900">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="connector-grid" id="hub-grid"></div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000"; // Dev default
        const USER_ID = "prisca-node-01";

        const connectors = [
            { id: 'whatsapp', name: 'WhatsApp', icon: '📱' },
            { id: 'gmail', name: 'Gmail', icon: '✉️' },
            { id: 'supabase', name: 'Supabase', icon: '⚡' },
            { id: 'outlook', name: 'Outlook', icon: '📬' },
            { id: 'slack', name: 'Slack', icon: '💬' },
            { id: 'drive', name: 'Google Drive', icon: '📁' },
            { id: 'stripe', name: 'Stripe', icon: '💳' },
            { id: 'github', name: 'GitHub', icon: '🐙' }
        ];

        function populateHub() {
            const grid = document.getElementById('hub-grid');
            connectors.forEach(c => {
                const card = document.createElement('div');
                card.className = 'connector-card';
                card.innerHTML = `<div class="text-4xl mb-3">${c.icon}</div><div class="font-bold text-slate-800">${c.name}</div><button class="mt-4 w-full py-2 bg-slate-100 rounded-lg text-sm font-bold text-slate-500 hover:bg-blue-600 hover:text-white transition-colors" onclick="toggleConnector('${c.id}')">Connect</button>`;
                grid.appendChild(card);
            });
        }

        async function syncToBackend(content, role) {
            try {
                await fetch(`${API_BASE}/chats/message`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ thread_id: "main", user_id: USER_ID, content, role })
                });
            } catch(e) { console.log("Backend offline."); }
        }

        function handleSend() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (!text) return;
            
            const history = document.getElementById('chat-history');
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = `<div class="text-[10px] font-black text-blue-500 uppercase mb-2">User</div><div class="text-lg text-slate-800">${text}</div>`;
            history.appendChild(bubble);
            
            syncToBackend(text, 'user');
            input.value = '';
            history.scrollTop = history.scrollHeight;
        }

        function toggleConnector(id) {
            const list = document.getElementById('active-connectors');
            const existing = document.getElementById(`active-${id}`);
            if (existing) {
                existing.remove();
            } else {
                const item = document.createElement('div');
                item.id = `active-${id}`;
                item.className = 'nav-item text-xs py-2';
                item.innerHTML = `<div class="w-2 h-2 rounded-full bg-green-500"></div><span>${id.toUpperCase()} Active</span>`;
                list.appendChild(item);
            }
            closeModal();
        }

        function createNewChat() { location.reload(); }
        populateHub();
    </script>
</body>
</html>
