<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | Apex Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --orca-black: #050505; --orca-white: #ffffff; --orca-blue: #1e3a8a; --sidebar-bg: #f8fafc; }
        body { background: var(--orca-white); color: var(--orca-black); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        .sidebar { background: var(--sidebar-bg); border-right: 1px solid #f1f5f9; }
        .chat-input { border: 1px solid #f1f5f9; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .glass-icon { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .btn-orca { background: var(--orca-black); color: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-orca:hover { background: var(--orca-blue); transform: translateY(-1px); }
        .text-orcinos { color: var(--orca-blue); }
    </style>
</head>
<body class="flex">
    <aside class="sidebar w-72 flex flex-col p-6 shrink-0 h-full">
        <div class="flex items-center gap-3 mb-10">
            <div class="w-9 h-9 rounded-xl overflow-hidden glass-icon flex items-center justify-center p-1"><img src="assets/logo.png" class="w-full h-full object-contain"></div>
            <span class="font-black tracking-tighter text-xl text-orcinos uppercase">ORCINOS</span>
        </div>
        <button class="w-full py-3 px-4 rounded-2xl border-2 border-dashed border-gray-200 text-gray-400 text-sm font-bold hover:border-blue-200 hover:text-blue-600 transition-all mb-8">+ Start New Thread</button>
        <div class="flex-1 overflow-y-auto">
            <div class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-5">History</div>
            <nav class="space-y-2">
                <a href="#" class="block p-3 rounded-xl bg-white border border-gray-100 text-xs font-semibold shadow-sm text-gray-700">Market Intelligence Scan</a>
                <a href="#" class="block p-3 rounded-xl hover:bg-white hover:shadow-sm text-xs text-gray-500 transition-all border border-transparent">Protocol Analysis</a>
            </nav>
        </div>
        <div class="mt-auto pt-6 border-t border-gray-100">
            <div class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-5">Neural Connectors</div>
            <div class="flex gap-3 mb-8">
                <div title="Google Workspace" class="w-9 h-9 rounded-xl glass-icon flex items-center justify-center cursor-pointer hover:scale-105 transition"><img src="https://www.gstatic.com/images/branding/product/1x/gsuite_2020q4_48dp.png" class="w-5 h-5"></div>
                <div title="Meta Intelligence" class="w-9 h-9 rounded-xl glass-icon flex items-center justify-center cursor-pointer hover:scale-105 transition"><img src="https://upload.wikimedia.org/wikipedia/commons/7/7b/Meta_Platforms_Inc._logo.svg" class="w-5 h-5"></div>
                <div title="Data Infrastructure" class="w-9 h-9 rounded-xl glass-icon flex items-center justify-center cursor-pointer hover:scale-105 transition"><img src="https://seeklogo.com/images/S/supabase-logo-DCC416773F-seeklogo.com.png" class="w-4 h-4"></div>
            </div>
            <button class="w-full flex items-center justify-center gap-3 py-3 px-4 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md transition-all text-xs font-black uppercase tracking-wider">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" class="w-4 h-4"> Sign in with Google
            </button>
        </div>
    </aside>
    <main class="flex-1 flex flex-col bg-white relative">
        <header class="p-5 flex justify-between items-center border-b border-gray-50">
            <div class="text-[10px] font-black tracking-[0.4em] text-gray-300 uppercase">Marine Protocol: Active</div>
            <div class="flex items-center gap-3"><div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div><span class="text-[9px] font-black text-blue-900 uppercase tracking-[0.2em]">ORCA-LAYER ENABLED</span></div>
        </header>
        <div class="flex-1 overflow-y-auto p-12 max-w-3xl mx-auto w-full space-y-10">
            <div class="flex gap-6">
                <div class="w-10 h-10 rounded-2xl bg-black shrink-0 flex items-center justify-center shadow-lg"><img src="assets/logo.png" class="w-6 h-6 brightness-0 invert"></div>
                <div class="space-y-3">
                    <div class="font-black text-[11px] uppercase tracking-[0.2em] text-orcinos">Orcinos Intelligence</div>
                    <p class="text-lg leading-relaxed text-gray-700 font-medium">Welcome to **Orcinos**. Our marine-tier intelligence is ready to assist you. How can we navigate your next strategic objective?</p>
                </div>
            </div>
        </div>
        <div class="p-10"><div class="max-w-3xl mx-auto relative">
                <div class="chat-input rounded-[2rem] bg-white p-5 flex flex-col gap-4">
                    <textarea placeholder="Message Orcinos..." class="w-full resize-none border-none focus:ring-0 text-gray-800 placeholder-gray-300 min-h-[80px] font-medium"></textarea>
                    <div class="flex justify-between items-center">
                        <div class="flex gap-3">
                            <button class="p-2.5 rounded-xl glass-icon text-gray-400 hover:text-blue-600 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg></button>
                            <button class="p-2.5 rounded-xl glass-icon text-gray-400 hover:text-blue-600 transition-colors"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
                        </div>
                        <button class="btn-orca py-3 px-8 rounded-2xl font-black text-[11px] tracking-[0.2em] flex items-center gap-3 shadow-md">EXECUTE<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg></button>
                    </div>
                </div>
            </div></div>
    </main>
</body>
</html>
