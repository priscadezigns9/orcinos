<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | Your Caribbean AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --accent-purple: #301934; 
            --accent-lilac: #C8A2C8;
            --sidebar-bg: #f9fafb;
        }
        
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: #fff; display: flex; height: 100vh; overflow: hidden; color: #111827; }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            flex-shrink: 0;
        }

        .logo-container { padding: 0 0 24px; }
        .brand-logo {
            width: 100%;
            height: 100px;
            object-fit: contain;
            background: white;
            padding: 0;
            border-radius: 0;
            box-shadow: none;
        }

        .nav-group { margin-bottom: 24px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            color: #4b5563;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .nav-item:hover { background: #f3f4f6; color: #111827; }
        .nav-item.active { background: white; color: var(--accent-purple); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* PROFILE SECTION */
        .profile-section {
            margin-top: auto;
            border-top: 1px solid #e5e7eb;
            padding: 16px 12px 8px;
            position: relative;
        }
        .profile-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .profile-trigger:hover { background: #f3f4f6; }
        .avatar {
            width: 32px;
            height: 32px;
            background: var(--accent-purple);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 12px;
        }

        .profile-menu {
            position: absolute;
            bottom: 100%;
            left: 12px;
            right: 12px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.1);
            padding: 8px;
            display: none;
            z-index: 50;
            margin-bottom: 8px;
        }
        .profile-menu.show { display: block; }
        .menu-item {
            padding: 10px 12px;
            font-size: 13px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #4b5563;
        }
        .menu-item:hover { background: #f9fafb; color: #111827; }

        /* CHAT SPACE */
        .chat-space { flex-grow: 1; display: flex; flex-direction: column; background: white; position: relative; }
        .message-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        .swipe-container {
            position: relative;
            width: 100%;
            height: 450px;
            margin: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .swipe-card {
            position: absolute;
            width: 320px;
            height: 420px;
            background: white;
            border-radius: 32px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: transform 0.5s ease, opacity 0.5s ease;
            cursor: grab;
            user-select: none;
        }

        .swipe-card:nth-last-child(1) { z-index: 3; transform: translateZ(0); }
        .swipe-card:nth-last-child(2) { z-index: 2; transform: translateZ(-50px) translateY(10px) scale(0.95); opacity: 0.8; }
        .swipe-card:nth-last-child(3) { z-index: 1; transform: translateZ(-100px) translateY(20px) scale(0.9); opacity: 0.5; }

        .message-bubble { 
            max-width: 80%; 
            padding: 16px 20px; 
            border-radius: 18px; 
            line-height: 1.5; 
            font-size: 15px;
            position: relative;
        }
        .message-bubble.user { background: #f3f4f6; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message-bubble.bot { background: var(--accent-purple); color: white; align-self: flex-start; border-bottom-left-radius: 4px; }

        .input-area { padding: 24px 40px 40px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f3f4f6;
            border-radius: 18px;
            padding: 6px 16px;
            border: 2px solid transparent;
        }
        .input-wrapper input { flex-grow: 1; background: transparent; border: none; outline: none; padding: 12px; font-size: 15px; }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-body {
            background: white;
            width: 90%;
            max-width: 500px;
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        .help-drawer {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }
        .help-drawer.open { right: 0; }
        .help-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-container">
            <img src="logo.jpg" alt="Orcinos" class="brand-logo">
        </div>

        <div class="nav-group">
            <div class="nav-item active" onclick="location.reload()">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                New Chat
            </div>
            <div class="nav-item" onclick="toggleModal('connectors')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a2 2 0 01-4 0V4zM7 8a2 2 0 012-2h6a2 2 0 012 2v8a2 2 0 01-2 2H9a2 2 0 01-2-2V8z"/></svg>
                Apps & MCPs
            </div>
            <div class="nav-item" onclick="handleSchedule('Plugins')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                Plugins
            </div>
            <div class="nav-item" onclick="handleSchedule('Scheduled')">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Scheduled
            </div>
        </div>

        <div class="profile-section">
            <div class="profile-menu" id="profile-menu">
                <div class="menu-item" onclick="toggleModal('personalization')">
                    <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"/></svg>
                    Personalization
                </div>
                <div class="menu-item" onclick="toggleHelp()">
                    <svg class="menu-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Help & Support
                </div>
            </div>
            <div class="profile-trigger" onclick="toggleProfile()">
                <div class="avatar">P</div>
                <div class="flex-grow">
                    <div class="text-sm font-bold">Prisca</div>
                    <div class="text-[10px] text-slate-400 uppercase font-black">Free Plan</div>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-space">
        <div class="message-container" id="chat-history">
            <div class="swipe-container" id="card-stack"></div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <div class="flex items-center gap-2 px-2">
                    <button class="p-2 text-slate-400 hover:text-blue-900 transition-colors" title="Attach File" onclick="handleAttachment()">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                    </button>
                    <button id="voice-btn" class="p-2 text-slate-400 hover:text-blue-900 transition-colors" title="Voice Note" onclick="handleVoice()">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg>
                    </button>
                    <input type="file" id="file-input" class="hidden" onchange="handleFileSelected(event)">
                </div>
                <input type="text" id="main-input" placeholder="What's on your mind?" onkeydown="if(event.key==='Enter') handleSend()">
                <button onclick="handleSend()" class="p-2 text-slate-400 hover:text-blue-900 transition-colors">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Modals & Drawer -->
    <div class="help-drawer" id="help-drawer">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">Support</h2>
            <button onclick="toggleHelp()">✕</button>
        </div>
        <div class="help-card" onclick="setCommand('Getting Started')">Getting Started Guide</div>
        <div class="mt-auto p-4 bg-blue-50 rounded-xl">
            <button onclick="window.open('https://wa.me/18683424101')" class="w-full py-3 bg-blue-900 text-white rounded-xl font-bold">Message Support</button>
        </div>
    </div>

    <div class="modal" id="connectors-modal">
        <div class="modal-body max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black text-blue-900">Apps & MCPs</h2>
                <button onclick="toggleModal('connectors')">✕</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 border rounded-2xl cursor-pointer" onclick="handleAppClick('WhatsApp')">WhatsApp</div>
                <div class="p-4 border rounded-2xl cursor-pointer" onclick="handleAppClick('Google')">Google</div>
            </div>
        </div>
    </div>

    <div class="modal" id="personalization-modal">
        <div class="modal-body">
            <h2 class="text-2xl font-black mb-6">Personalization</h2>
            <button onclick="savePersonalization()" class="w-full py-4 bg-blue-900 text-white rounded-xl font-bold">Save Preferences</button>
        </div>
    </div>

    <script>
        const tasks = [
            { id: '1', icon: '🍲', title: 'Meal Planner', desc: 'Caribbean recipes' },
            { id: '2', icon: '🛡️', title: 'Antivirus', desc: 'System security' },
            { id: '3', icon: '⚖️', title: 'Legal Help', desc: 'Law intelligence' }
        ];

        function renderStack() {
            const stack = document.getElementById('card-stack');
            stack.innerHTML = tasks.map(t => `
                <div class="swipe-card" onmousedown="startDrag(event)" onclick="setCommand('${t.title}')">
                    <div class="text-8xl mb-8">${t.icon}</div>
                    <div class="font-extrabold text-3xl mb-4 text-slate-900">${t.title}</div>
                    <p class="text-slate-500 text-lg">${t.desc}</p>
                </div>
            `).join('');
        }

        let isDragging = false, startX = 0, currentCard = null;
        function startDrag(e) { isDragging = true; startX = e.clientX; currentCard = e.currentTarget; document.addEventListener('mousemove', drag); document.addEventListener('mouseup', endDrag); }
        function drag(e) { if (!isDragging || !currentCard) return; const diffX = e.clientX - startX; currentCard.style.transform = `translateX(${diffX}px) rotate(${diffX/20}deg)`; currentCard.style.opacity = 1 - Math.abs(diffX)/1000; }
        function endDrag(e) { if (!isDragging || !currentCard) return; const diffX = e.clientX - startX; if (Math.abs(diffX) > 150) { currentCard.remove(); if (!document.querySelector('.swipe-card')) document.getElementById('card-stack').style.display = 'none'; } else { currentCard.style.transform = ''; currentCard.style.opacity = ''; } isDragging = false; document.removeEventListener('mousemove', drag); document.removeEventListener('mouseup', endDrag); }

        function toggleProfile() { document.getElementById('profile-menu').classList.toggle('show'); }
        function toggleHelp() { document.getElementById('help-drawer').classList.toggle('open'); document.getElementById('profile-menu').classList.remove('show'); }
        function toggleModal(id) { document.getElementById(id + '-modal').style.display = document.getElementById(id + '-modal').style.display === 'flex' ? 'none' : 'flex'; document.getElementById('profile-menu').classList.remove('show'); }
        function savePersonalization() { toggleModal('personalization'); }
        function handleSchedule(f) { alert(f + ' coming soon!'); }
        function handleAppClick(a) { alert('Connecting to ' + a); }
        function handleAttachment() { document.getElementById('file-input').click(); }
        function handleFileSelected(e) { alert('File: ' + e.target.files[0].name); }
        let rec = false; function handleVoice() { rec = !rec; document.getElementById('voice-btn').classList.toggle('text-red-500', rec); if(!rec) alert('Voice captured'); }
        
        function handleSend() {
            const input = document.getElementById('main-input');
            const text = input.value.trim();
            if (!text) return;
            document.getElementById('card-stack').style.display = 'none';
            const history = document.getElementById('chat-history');
            const userMsg = document.createElement('div');
            userMsg.className = 'message-bubble user';
            userMsg.innerText = text;
            history.appendChild(userMsg);
            input.value = '';
            setTimeout(() => {
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message-bubble bot';
                aiMsg.innerText = "I'm processing that for you.";
                history.appendChild(aiMsg);
                history.scrollTop = history.scrollHeight;
            }, 800);
        }
        function setCommand(t) { document.getElementById('main-input').value = t; toggleHelp(); }

        renderStack();
    </script>
</body>
</html>
