<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | High-Fidelity Software</title>
    <link rel="icon" type="image/png" href="logos/orcinos_icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFFFFF;
            --text: #000000;
            --muted: #888888;
            --accent: #000000;
            --border: #EEEEEE;
            --font-body: 'Inter', -apple-system, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: var(--font-body); 
            line-height: 1.4; 
            -webkit-font-smoothing: antialiased; 
            padding-bottom: 100px;
        }

        nav {
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border);
        }

        .logo { font-weight: 900; font-size: 1.1rem; letter-spacing: -0.02em; text-transform: uppercase; }
        .nav-btn {
            background: #000; color: #FFF; padding: 8px 18px; border-radius: 100px;
            text-decoration: none; font-size: 0.85rem; font-weight: 700;
        }

        .hero {
            padding: 160px 8% 80px;
            max-width: 1100px;
        }

        .label {
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; 
            letter-spacing: 0.15em; color: var(--muted); margin-bottom: 20px; display: block;
        }

        .hero h1 {
            font-size: clamp(2.5rem, 9vw, 5.5rem);
            font-weight: 900;
            letter-spacing: -0.05em;
            line-height: 0.95;
            margin-bottom: 40px;
        }

        .hero p {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 500;
            color: var(--text);
            max-width: 800px;
            line-height: 1.2;
            margin-bottom: 60px;
        }

        /* Products Grid - Minimalist Cards */
        .section-header { padding: 40px 8% 20px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
        .section-header h2 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.03em; }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            background: var(--border);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        @media (min-width: 768px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (min-width: 1100px) {
            .product-grid { grid-template-columns: repeat(3, 1fr); }
        }

        .product-card {
            background: #FFF;
            padding: 60px 10%;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: background 0.2s ease;
            min-height: 400px;
        }

        .product-card:hover { background: #FAFAFA; }

        .product-card .cat {
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.1em; color: var(--muted); margin-bottom: 30px;
        }

        .product-card h3 {
            font-size: 2.2rem; font-weight: 900; letter-spacing: -0.04em;
            line-height: 1; margin-bottom: 20px;
        }

        .product-card p {
            font-size: 1rem; color: var(--muted); font-weight: 500; line-height: 1.4; flex-grow: 1;
        }

        .product-card .arrow { margin-top: 40px; }

        footer {
            padding: 100px 8% 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--muted);
        }

        .god-trigger { cursor: pointer; user-select: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">ORCINOS</div>
        <a href="https://priscion.com" class="nav-btn">Priscion Hub</a>
    </nav>

    <section class="hero">
        <span class="label">Trusted Software Division</span>
        <h1>High-Fidelity Software for the Modern Pocket.</h1>
        <p>A suite of sovereign tools designed for clarity, performance, and absolute mobility.</p>
    </section>

    <div class="section-header">
        <h2>Active Nodes</h2>
    </div>

    <div class="product-grid" id="products">
        <!-- Products injected via JS -->
    </div>

    <footer>
        <div>
            <span class="god-trigger" id="god-trigger-text">&copy; 2026 ORCINOS</span><br>
            A Prisicon Network Entity.
        </div>
        <div style="text-align: right;">
            Lattome.<br>
            <span style="opacity: 0.5">Sovereign Architecture</span>
        </div>
    </footer>

    <script>
        const products = [
            { name: "Captio AI", slug: "captioai", cat: "AI Tools", desc: "Sovereign engine for high-fidelity social captioning." },
            { name: "OptiScout", slug: "optiscout", cat: "Market", desc: "Autonomous deal discovery and real-time market intelligence." },
            { name: "SovSygnal", slug: "sovsygnal", cat: "Intel", desc: "Global signal processing for data-driven decisions." },
            { name: "Nurasen", slug: "nurasen", cat: "Security", desc: "Neural defense and high-fidelity protection protocols." },
            { name: "Syla", slug: "syla", cat: "Logistics", desc: "The intelligent handshake for daily asset management." },
            { name: "Titan TraderX", slug: "titantraderx", cat: "Finance", desc: "Institutional grade infrastructure for sovereign traders." },
            { name: "Nemuie", slug: "nemuie", cat: "Wellness", desc: "Scientific sleep optimization and cognitive recovery." },
            { name: "Riddiim", slug: "riddiim", cat: "Music", desc: "Audio engineering for the sovereign studio." },
            { name: "Calalloo", cat: "Culture", slug: "calalloo", desc: "The registry for Caribbean heritage and culinary DNA." },
            { name: "PawDX", slug: "pawdx", cat: "Health", desc: "AI veterinary diagnostics for modern pet care." },
            { name: "Firmless", slug: "firmless", cat: "Legal", desc: "Automated contract logic for independent creators." },
            { name: "Senpai", slug: "senpai", cat: "Learning", desc: "Micro-learning platform for rapid skill acquisition." },
            { name: "Vyne", slug: "vyne", cat: "Social", desc: "The commerce network for sovereign creators." },
            { name: "PrayerBlock", slug: "prayerblock", cat: "Faith", desc: "A decentralized ledger for spiritual discipline." },
            { name: "Hartaly", slug: "hartaly", cat: "Health", desc: "Cardiac telemetry and heart-health intelligence." },
            { name: "Dricil", slug: "dricil", cat: "Agency", desc: "Fully autonomous digital marketing agency logic." }
        ];

        const grid = document.getElementById('products');
        products.forEach(p => {
            const card = document.createElement('a');
            card.href = `./${p.slug}/`;
            card.className = 'product-card';
            card.innerHTML = `
                <div class="cat">${p.cat}</div>
                <h3>${p.name}</h3>
                <p>${p.desc}</p>
                <div class="arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
            `;
            grid.appendChild(card);
        });

        // God Mode Handshake
        let clicks = 0;
        document.getElementById('god-trigger-text').addEventListener('click', () => {
            clicks++;
            if (clicks === 5) {
                const token = prompt("ENTER_ARCHITECT_TOKEN:");
                if (token === 'alice') window.location.href = './godmode/hub.html';
                clicks = 0;
            }
            setTimeout(() => { clicks = 0; }, 3000);
        });
    </script>
</body>
</html>
