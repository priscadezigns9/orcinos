<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORCINOS | Sovereign Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --orca-black: #050505; --orca-white: #ffffff; --orca-blue: #1e3a8a; }
        body { background: var(--orca-white); color: var(--orca-black); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.7); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 0, 0, 0.05); 
        }

        .action-swipe-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 12px;
            padding: 20px;
            scrollbar-width: none;
        }
        .action-swipe-container::-webkit-scrollbar { display: none; }

        .action-card {
            min-width: 280px;
            height: 160px;
            scroll-snap-align: center;
            background: white;
            border: 1px solid #f1f5f9;
            border-radius: 24px;
            padding: 24px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
        }
        .action-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); border-color: var(--orca-blue); }

        .btn-execute {
            background: var(--orca-black);
            color: white;
            transition: all 0.3s;
        }
        .btn-execute:active { transform: scale(0.95); }
        
        .brain-chip {
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: #64748b;
        }

        /* Futuristic Minimalist Icon Styles */
        .f-icon { width: 24px; height: 24px; stroke-width: 1.5; stroke: currentColor; fill: none; }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header: Pure & Minimal -->
    <header class="p-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-900 rounded-full flex items-center justify-center">
                <div class="w-3 h-3 bg-white rounded-full"></div>
            </div>
            <span class="font-black text-xl tracking-tighter">ORCINOS</span>
        </div>
        <div class="flex gap-4">
            <div class="brain-chip">ORCA LAYER ACTIVE</div>
        </div>
    </header>

    <!-- Main View -->
    <main class="flex-1 flex flex-col justify-center max-w-5xl mx-auto w-full px-8 pb-20">
        
        <!-- Swipable Action Hub -->
        <div class="action-swipe-container">
            <!-- WhatsApp -->
            <div class="action-card group cursor-pointer" onclick="handleAction('whatsapp')">
                <div class="flex justify-between items-start">
                    <div class="p-3 bg-slate-50 rounded-2xl group-hover:bg-blue-50 transition-colors">
                        <svg class="f-icon text-slate-400 group-hover:text-blue-600"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 11-7.6-11.6h.1"></path><path d="M3 21l1.9-1.9"></path></svg>
                    </div>
                    <span class="text-[10px] font-black text-slate-300">NEURAL</span>
                </div>
                <div>
                    <h3 class="font-bold text-lg">WhatsApp</h3>
                    <p class="text-xs text-slate-400">Direct message interface</p>
                </div>
            </div>

            <!-- Workspace -->
            <div class="action-card group cursor-pointer" onclick="handleAction('workspace')">
                <div class="flex justify-between items-start">
                    <div class="p-3 bg-slate-50 rounded-2xl group-hover:bg-blue-50 transition-colors">
                        <svg class="f-icon text-slate-400 group-hover:text-blue-600"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </div>
                    <span class="text-[10px] font-black text-slate-300">WORKSPACE</span>
                </div>
                <div>
                    <h3 class="font-bold text-lg">Calendar</h3>
                    <p class="text-xs text-slate-400">Schedule & Agenda sync</p>
                </div>
            </div>

            <!-- Intelligence -->
            <div class="action-card group cursor-pointer" onclick="handleAction('news')">
                <div class="flex justify-between items-start">
                    <div class="p-3 bg-slate-50 rounded-2xl group-hover:bg-blue-50 transition-colors">
                        <svg class="f-icon text-slate-400 group-hover:text-blue-600"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path></svg>
                    </div>
                    <span class="text-[10px] font-black text-slate-300">LUNA TIER</span>
                </div>
                <div>
                    <h3 class="font-bold text-lg">Intelligence</h3>
                    <p class="text-xs text-slate-400">Regional signal aggregator</p>
                </div>
            </div>
        </div>

        <!-- The Chat Console -->
        <div class="mt-8 relative group">
            <div class="glass-panel rounded-[32px] p-2 shadow-2xl transition-all group-focus-within:border-blue-500/30">
                <div class="p-6">
                    <textarea id="chat-input" placeholder="Initiate command..." class="w-full resize-none bg-transparent border-none focus:ring-0 text-xl font-medium placeholder-slate-200 min-h-[100px]"></textarea>
                    
                    <div class="flex justify-between items-center mt-4">
                        <div class="flex gap-2">
                            <!-- Attach Button -->
                            <button id="attach-btn" class="p-4 rounded-2xl bg-slate-50 text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                            </button>
                            <!-- Recorder Button -->
                            <button id="record-btn" class="p-4 rounded-2xl bg-slate-50 text-slate-400 hover:text-red-600 hover:bg-red-50 transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                            </button>
                        </div>

                        <!-- Execute Button -->
                        <button id="execute-btn" class="btn-execute h-14 px-10 rounded-2xl font-black text-xs tracking-widest flex items-center gap-3">
                            EXECUTE
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Button Functionality
        document.getElementById('execute-btn').addEventListener('click', () => {
            const val = document.getElementById('chat-input').value;
            if(val) {
                alert('Command Initiated: ' + val);
                document.getElementById('chat-input').value = '';
            }
        });

        document.getElementById('attach-btn').addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = e => alert('File selected: ' + e.target.files[0].name);
            input.click();
        });

        document.getElementById('record-btn').addEventListener('click', () => {
            alert('Neural Audio Link Initialized...');
        });

        function handleAction(type) {
            alert('Switching to ' + type.toUpperCase() + ' flow');
        }
    </script>
</body>
</html>
