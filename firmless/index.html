<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRMLESS | Prop Firm Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../shared_godmode.css">
    <style>
        :root {
            --bg: #000000; --surface: #0A0A0A; --text: #FFFFFF; --muted: #666666; 
            --accent: #FFD700; --primary: #1A1A1A; --border: rgba(255, 215, 0, 0.1);
            --font-header: 'Playfair Display', serif; --font-body: 'Inter', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; overflow-x: hidden; }
        
        header { padding: 40px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { font-family: var(--font-header); font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; color: var(--accent); }

        .hero { padding: 120px 6%; text-align: center; max-width: 1000px; margin: 0 auto; }
        .hero h1 { font-family: var(--font-header); font-size: 5rem; line-height: 1; margin-bottom: 30px; letter-spacing: -2px; }
        
        .feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 0 6% 100px; }
        .feature-card { background: var(--surface); border: 1px solid var(--border); padding: 40px; border-radius: 12px; transition: 0.4s; }
        .feature-card:hover { border-color: var(--accent); background: #111; }
    </style>
</head>
<body>
    <header><img src="https://share.zapia.com/iqqav734t137jcn6z2ydqx" alt="FIRMLESS" style="height: 60px;"></header>
    <section class="hero">
        <h1>Sovereign Prop Firm Logic.</h1>
        <p style="font-size: 1.2rem; color: var(--muted); text-transform: uppercase; letter-spacing: 5px; margin-top: 20px;">Legal Infrastructure // Automated Contracts</p>
    </section>
    <div class="feature-grid">
        <div class="feature-card"><h3>Contract Forge</h3><p style="color:var(--muted); margin-top:15px;">Autonomous generation of proprietary trading agreements.</p></div>
        <div class="feature-card"><h3>Compliance Shard</h3><p style="color:var(--muted); margin-top:15px;">Real-time regulatory alignment for global prop firms.</p></div>
        <div class="feature-card"><h3>Payout Gate</h3><p style="color:var(--muted); margin-top:15px;">Unified settlement layer for trader compensation.</p></div>
    </div>
    <script src="../shared_godmode.js"></script>
</body>
</html>
