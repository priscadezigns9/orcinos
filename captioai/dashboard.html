<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='icon' type='image/png' href='../logos/CAPTIOAI_ICON_LOGO.png'>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>CAPTIO AI | Neural Copy Dashboard</title>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg: #F8FAFC; --text: #0F172A; --muted: #64748B; --accent: #2E5BBA; --border: rgba(0,0,0,0.08);
            --white: #ffffff; --surface: #ffffff; --malachite: #00FF7F;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        nav { 
            background: var(--white); padding: 0 6%; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; height: 80px;
        }
        .logo img { height: 35px; width: auto; }
        
        .nav-actions { display: flex; align-items: center; gap: 20px; }
        .tier-badge { 
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; 
            color: var(--white); background: #000; padding: 8px 18px; border-radius: 100px;
        }
        .settings-btn { 
            background: none; border: none; cursor: pointer; color: var(--muted); 
            font-size: 1.2rem; transition: 0.3s; 
        }
        .settings-btn:hover { color: var(--accent); }

        .container { padding: 40px 6%; max-width: 1200px; margin: 0 auto; }
        
        .instruction-box { 
            background: var(--white); padding: 30px; border-radius: 24px; 
            border-left: 6px solid var(--accent); margin-bottom: 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }
        .instruction-box h2 { font-size: 1.2rem; margin-bottom: 10px; font-weight: 800; }
        .instruction-box p { color: var(--muted); font-size: 0.95rem; margin-bottom: 15px; }

        .editor-area { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .editor-area { grid-template-columns: 1fr; } }

        .panel { 
            background: var(--white); padding: 40px; border-radius: 28px; 
            border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        }
        h3 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); letter-spacing: 2px; margin-bottom: 20px; font-weight: 800; }
        
        textarea { 
            width: 100%; height: 250px; padding: 25px; border: 1px solid var(--border); 
            border-radius: 16px; font-size: 1rem; outline: none; transition: 0.3s; 
            resize: none; background: #FBFDFE; line-height: 1.6; font-family: inherit;
        }
        textarea:focus { border-color: var(--accent); background: var(--white); box-shadow: 0 0 0 4px rgba(46,91,186,0.05); }
        
        .controls { margin-top: 25px; display: flex; gap: 15px; }
        .btn-captio { 
            padding: 16px 32px; background: var(--accent); color: var(--white); border: none; 
            border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; 
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;
        }
        .btn-captio:hover { background: #000; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        
        .output-box { 
            min-height: 250px; background: #F1F5F9; border-radius: 16px; padding: 25px; 
            font-size: 1rem; color: #1E293B; line-height: 1.7; position: relative;
            border: 1px solid var(--border);
        }
        
        .loading-text { font-weight: 700; color: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* Settings Modal */
        #settings-modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--white); padding: 40px; border-radius: 28px;
            width: 100%; max-width: 450px; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-content h2 { margin-bottom: 20px; font-weight: 800; }
        .modal-content input {
            width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border);
            margin-bottom: 20px; font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <nav>
        <div class='logo'><img src='../logos/CAPTIOAI_DEFINITIVE_LOGO.png' alt='Captio AI'></div>
        <div class='nav-actions'>
            <div id='tier-badge' class='tier-badge'>Neural Node Active</div>
            <button class='settings-btn' onclick='toggleSettings()'>⚙️</button>
        </div>
    </nav>
    
    <div class='container'>
        <div class='instruction-box'>
            <h2>Captio Intelligence Core</h2>
            <p>Deploy the high-fidelity neural engine to generate institutional-grade captions for your brands.</p>
        </div>
        
        <div class='editor-area'>
            <div class='panel'>
                <h3>Neural Input</h3>
                <textarea id='neural-input' placeholder='Enter context: Brand name, product details, or specific vibes...'></textarea>
                <div class='controls'>
                    <button class='btn-captio' onclick='generateCopy()'>Synchronize Engine</button>
                </div>
            </div>
            <div class='panel'>
                <h3>Neural Output</h3>
                <div id='neural-output' class='output-box'>
                    <span style='color: var(--muted);'>Awaiting input signal...</span>
                </div>
                <div class='controls'>
                    <button id='copy-btn' class='btn-captio' style='background: #000; display: none;' onclick='copyResult()'>Copy to Clipboard</button>
                </div>
            </div>
        </div>
    </div>

    <div id='settings-modal'>
        <div class='modal-content'>
            <h2>Engine Settings</h2>
            <p style='color: var(--muted); font-size: 0.9rem; margin-bottom: 20px;'>Enter your OpenAI API Key to activate high-fidelity neural generation.</p>
            <input type='password' id='api-key' placeholder='sk-....'>
            <div style='display: flex; gap: 10px;'>
                <button class='btn-captio' onclick='saveSettings()' style='flex:1;'>Save Key</button>
                <button class='btn-captio' onclick='toggleSettings()' style='flex:1; background: #eee; color: #000;'>Close</button>
            </div>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('api-key');
        const neuralInput = document.getElementById('neural-input');
        const neuralOutput = document.getElementById('neural-output');
        const copyBtn = document.getElementById('copy-btn');
        const modal = document.getElementById('settings-modal');

        if (localStorage.getItem('CAPTIO_API_KEY')) {
            apiKeyInput.value = localStorage.getItem('CAPTIO_API_KEY');
        }

        function toggleSettings() {
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function saveSettings() {
            localStorage.setItem('CAPTIO_API_KEY', apiKeyInput.value);
            alert('Engine synchronized successfully.');
            toggleSettings();
        }

        async function generateCopy() {
            const input = neuralInput.value;
            const key = localStorage.getItem('CAPTIO_API_KEY');

            if (!input) { alert('Please enter an input signal.'); return; }
            if (!key) { 
                alert('Neural key missing. Please open settings and enter your OpenAI API Key.'); 
                toggleSettings();
                return; 
            }

            neuralOutput.innerHTML = '<span class="loading-text">Neural Engine Synchronizing...</span>';
            copyBtn.style.display = 'none';

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini',
                        messages: [
                            {
                                role: 'system',
                                content: "You are Captio AI, an institutional-grade social media manager. Your voice is sophisticated, high-fidelity, and professional. You specialize in crafting captions that emphasize precision engineering, architectural purity, and sovereign autonomy. Avoid generic marketing fluff. Focus on value, clarity, and authority. Use 1-2 relevant emojis and 3-5 high-quality hashtags."
                            },
                            {
                                role: 'user',
                                content: `Generate a high-fidelity caption based on this context: ${input}`
                            }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                neuralOutput.innerText = data.choices[0].message.content;
                copyBtn.style.display = 'block';

            } catch (err) {
                neuralOutput.innerHTML = `<span style='color: #ef4444;'>Error: ${err.message}</span>`;
            }
        }

        function copyResult() {
            const text = neuralOutput.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                const orig = btn.textContent;
                btn.textContent = 'COPIED!';
                setTimeout(() => btn.textContent = orig, 2000);
            });
        }
    </script>
</body>
</html>
