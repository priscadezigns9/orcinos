<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7c3aed">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Presab">
<meta name="mobile-web-app-capable" content="yes">
<title>Presab — Teacher View</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ─── RESET ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #0d0621; }

/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --purple:    #7c3aed;
  --purple-d:  #5b21b6;
  --lilac:     #c084fc;
  --green:     #10b981;
  --green-s:   #d1fae5;
  --red:       #ef4444;
  --amber:     #f59e0b;
  --white:     #ffffff;
  --ink:       #1a0a2e;
  --glass:     rgba(255,255,255,0.08);
  --glass-b:   rgba(255,255,255,0.14);
  --font:      'Urbanist', sans-serif;
  --font-h:    'DM Serif Display', serif;
}

/* ─── GATE SCREEN ────────────────────────────────────────── */
#gate {
  position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(160deg, #0d0621 0%, #1e0a4a 100%);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 0;
}
.gate-logo {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 40px;
}
.gate-mark {
  width: 48px; height: 48px;
  background: linear-gradient(135deg, var(--purple), var(--lilac));
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.gate-mark svg { width: 24px; height: 24px; }
.gate-wordmark { font-family: var(--font-h); font-size: 26px; color: var(--white); letter-spacing: -0.5px; }
.gate-subtitle { font-family: var(--font); font-size: 12px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--lilac); margin-top: 2px; }

.gate-card {
  width: 100%; max-width: 360px;
  background: var(--glass); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px; padding: 28px 24px; backdrop-filter: blur(20px);
}
.gate-label {
  font-family: var(--font); font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.5); margin-bottom: 8px;
}
.gate-input {
  width: 100%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  padding: 14px 16px; color: var(--white); font-family: var(--font);
  font-size: 16px; letter-spacing: 0.1em; text-align: center;
  outline: none; transition: border 0.2s;
}
.gate-input::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 0.05em; }
.gate-input:focus { border-color: var(--purple); }
.gate-btn {
  width: 100%; margin-top: 16px;
  background: linear-gradient(135deg, var(--purple), var(--purple-d));
  color: var(--white); border: none; border-radius: 10px;
  padding: 15px; font-family: var(--font); font-size: 14px;
  font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; transition: opacity 0.2s;
}
.gate-btn:active { opacity: 0.8; }
.gate-error {
  margin-top: 12px; color: #fca5a5; font-family: var(--font);
  font-size: 13px; text-align: center; min-height: 18px;
}
.gate-hint {
  margin-top: 20px; font-family: var(--font); font-size: 12px;
  color: rgba(255,255,255,0.35); text-align: center; line-height: 1.6;
}

/* ─── MAIN APP ───────────────────────────────────────────── */
#app {
  display: none;
  flex-direction: column;
  height: 100%; height: 100dvh;
  background: #0d0621;
  position: relative;
}

/* ─── CAMERA VIEWPORT ────────────────────────────────────── */
#cam-wrap {
  position: relative;
  flex: 1; overflow: hidden;
  background: #000;
}
#cam-video {
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1); /* mirror for selfie feel */
}
#cam-canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
  pointer-events: none;
}
#cam-placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  background: linear-gradient(160deg, #0a0118 0%, #1a0535 100%);
}
.cam-placeholder-icon {
  width: 72px; height: 72px; border-radius: 50%;
  background: rgba(124,58,237,0.15);
  border: 2px dashed rgba(124,58,237,0.4);
  display: flex; align-items: center; justify-content: center;
}
.cam-placeholder-text {
  font-family: var(--font); font-size: 13px; color: rgba(255,255,255,0.4);
  text-align: center; letter-spacing: 0.03em;
}

/* scan frame overlay */
#scan-frame {
  position: absolute; inset: 0; pointer-events: none;
  display: none;
}
.sf-corner {
  position: absolute; width: 28px; height: 28px;
  border-color: var(--lilac); border-style: solid;
  opacity: 0.7;
}
.sf-tl { top: 18%; left: 18%; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
.sf-tr { top: 18%; right: 18%; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
.sf-bl { bottom: 18%; left: 18%; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
.sf-br { bottom: 18%; right: 18%; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

/* HUD overlay */
#hud {
  position: absolute; top: 0; left: 0; right: 0;
  padding: 52px 16px 12px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.55) 0%, transparent 100%);
  display: flex; align-items: flex-start; justify-content: space-between;
}
.hud-left { display: flex; flex-direction: column; gap: 2px; }
.hud-class {
  font-family: var(--font); font-size: 15px; font-weight: 600;
  color: var(--white); letter-spacing: -0.2px;
}
.hud-date {
  font-family: var(--font); font-size: 11px; color: rgba(255,255,255,0.55);
  letter-spacing: 0.02em;
}
.hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
#hud-count {
  font-family: var(--font-h); font-size: 32px; color: var(--white);
  line-height: 1;
}
.hud-count-label {
  font-family: var(--font); font-size: 10px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.45);
}

/* engine status pill */
#engine-pill {
  position: absolute; top: 52px; left: 50%; transform: translateX(-50%);
  background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.5);
  border-radius: 20px; padding: 4px 12px;
  font-family: var(--font); font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: #6ee7b7; display: none; align-items: center; gap: 6px;
  white-space: nowrap;
}
#engine-pill::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  animation: blink 1.5s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ─── CONTROLS BAR ───────────────────────────────────────── */
#controls {
  padding: 16px 20px 32px;
  background: linear-gradient(to top, #0d0621 70%, transparent);
  display: flex; flex-direction: column; gap: 12px;
}

/* capture button */
#btn-capture {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--purple-d));
  border: 4px solid rgba(255,255,255,0.2);
  box-shadow: 0 0 0 0 rgba(124,58,237,0.5);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  align-self: center;
}
#btn-capture:active { transform: scale(0.94); }
#btn-capture.active {
  box-shadow: 0 0 0 12px rgba(124,58,237,0.2);
  animation: capture-pulse 2s infinite;
}
@keyframes capture-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4); }
  50%      { box-shadow: 0 0 0 16px rgba(124,58,237,0); }
}
#btn-capture svg { width: 28px; height: 28px; }

/* secondary row */
.ctrl-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
}
.ctrl-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
  background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px; padding: 11px 8px;
  font-family: var(--font); font-size: 12px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,0.7); cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.ctrl-btn:active { background: rgba(255,255,255,0.14); }
.ctrl-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.ctrl-btn.active { border-color: var(--purple); color: var(--lilac); background: rgba(124,58,237,0.15); }

/* ─── ATTENDANCE FEED (bottom sheet) ─────────────────────── */
#sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #100828;
  border-top: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px 20px 0 0;
  max-height: 55vh;
  transform: translateY(calc(100% - 64px));
  transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
  z-index: 50;
  display: flex; flex-direction: column;
}
#sheet.open { transform: translateY(0); }
#sheet-handle {
  padding: 12px 0 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0;
}
#sheet-handle::after {
  content: ''; width: 36px; height: 4px;
  background: rgba(255,255,255,0.2); border-radius: 2px;
}
#sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 20px 12px; flex-shrink: 0;
}
#sheet-title {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,0.6);
}
#sheet-badge {
  background: var(--purple); color: var(--white);
  font-family: var(--font); font-size: 11px; font-weight: 700;
  border-radius: 20px; padding: 2px 10px; min-width: 28px; text-align: center;
}
#feed-list {
  flex: 1; overflow-y: auto; padding: 0 16px 24px;
  display: flex; flex-direction: column; gap: 8px;
}
#feed-list::-webkit-scrollbar { display: none; }
.feed-empty {
  text-align: center; color: rgba(255,255,255,0.25);
  font-family: var(--font); font-size: 13px; padding: 24px 0;
}
.feed-item {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 11px 14px;
  animation: slide-in 0.25s ease;
}
@keyframes slide-in {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.fi-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--lilac));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font); font-size: 14px; font-weight: 700;
  color: var(--white); flex-shrink: 0;
}
.fi-info { flex: 1; min-width: 0; }
.fi-name {
  font-family: var(--font); font-size: 14px; font-weight: 600;
  color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.fi-role {
  font-family: var(--font); font-size: 11px; color: rgba(255,255,255,0.4);
  text-transform: capitalize; margin-top: 1px;
}
.fi-time {
  font-family: var(--font); font-size: 12px; color: var(--green);
  font-weight: 600; flex-shrink: 0;
}

/* ─── TOAST ──────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(20,10,40,0.95); border: 1px solid rgba(124,58,237,0.4);
  border-radius: 12px; padding: 11px 18px;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font); font-size: 13px; color: var(--white);
  white-space: nowrap; opacity: 0; transition: opacity 0.25s, transform 0.25s;
  z-index: 200; pointer-events: none; max-width: 88vw;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast-icon { flex-shrink: 0; }

/* ─── INSTALL PROMPT ─────────────────────────────────────── */
#install-bar {
  position: fixed; top: 0; left: 0; right: 0;
  background: linear-gradient(90deg, var(--purple-d), var(--purple));
  padding: 10px 16px;
  display: none; align-items: center; justify-content: space-between; gap: 10px;
  z-index: 300;
}
#install-bar p {
  font-family: var(--font); font-size: 13px; color: var(--white);
  font-weight: 500; line-height: 1.4;
}
#install-bar p span { opacity: 0.75; font-size: 11px; display: block; }
#btn-install {
  background: var(--white); color: var(--purple-d);
  border: none; border-radius: 8px; padding: 8px 14px;
  font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: 0.05em; text-transform: uppercase;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
#btn-dismiss-install {
  background: none; border: none; color: rgba(255,255,255,0.5);
  font-size: 18px; cursor: pointer; padding: 4px; flex-shrink: 0;
}

/* ─── SAFE AREA FIX (notch phones) ──────────────────────── */
#app { padding-top: env(safe-area-inset-top); }
#controls { padding-bottom: calc(32px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>

<!-- ─── INSTALL BAR ───────────────────────────────────────── -->
<div id="install-bar">
  <p>Add Presab to your home screen
    <span>Works offline · No app store needed</span>
  </p>
  <button id="btn-install">Install</button>
  <button id="btn-dismiss-install">✕</button>
</div>

<!-- ─── GATE ──────────────────────────────────────────────── -->
<div id="gate">
  <div class="gate-logo">
    <div class="gate-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>
    <div>
      <div class="gate-wordmark">Presab</div>
      <div class="gate-subtitle">Teacher View</div>
    </div>
  </div>

  <div class="gate-card">
    <div class="gate-label">Access Code</div>
    <input type="password" id="gate-code" class="gate-input"
      placeholder="Enter access code"
      autocomplete="off" autocapitalize="none"
      onkeydown="if(event.key==='Enter')unlock()">
    <button class="gate-btn" onclick="unlock()">Unlock</button>
    <div class="gate-error" id="gate-err"></div>
  </div>

  <div class="gate-hint">
    Provided by your school administrator.<br>
    Contact admin if you don't have a code.
  </div>
</div>

<!-- ─── MAIN APP ──────────────────────────────────────────── -->
<div id="app">

  <!-- camera -->
  <div id="cam-wrap">
    <video id="cam-video" autoplay muted playsinline></video>
    <canvas id="cam-canvas"></canvas>

    <div id="cam-placeholder">
      <div class="cam-placeholder-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(124,58,237,0.6)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <div class="cam-placeholder-text">Tap the button below<br>to start the camera</div>
    </div>

    <!-- scan frame corners -->
    <div id="scan-frame">
      <div class="sf-corner sf-tl"></div>
      <div class="sf-corner sf-tr"></div>
      <div class="sf-corner sf-bl"></div>
      <div class="sf-corner sf-br"></div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div class="hud-class" id="hud-class">Class Session</div>
        <div class="hud-date" id="hud-date">—</div>
      </div>
      <div class="hud-right">
        <div id="hud-count">0</div>
        <div class="hud-count-label">Present</div>
      </div>
    </div>

    <!-- engine connected pill -->
    <div id="engine-pill">Engine Live</div>
  </div>

  <!-- controls -->
  <div id="controls">
    <!-- big capture button -->
    <button id="btn-capture" onclick="toggleCamera()" title="Start / Stop Camera">
      <svg id="ico-start" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <svg id="ico-stop" viewBox="0 0 24 24" fill="#fff" style="display:none">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
      </svg>
    </button>

    <!-- secondary controls -->
    <div class="ctrl-row">
      <button class="ctrl-btn" id="btn-flip" onclick="flipCamera()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Flip
      </button>
      <button class="ctrl-btn" id="btn-engine" onclick="connectEngine()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8m-4-4v4"/>
        </svg>
        Engine
      </button>
      <button class="ctrl-btn" onclick="toggleSheet()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
        </svg>
        Log
      </button>
      <button class="ctrl-btn" onclick="exportLog()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export
      </button>
    </div>
  </div>

  <!-- ─── ATTENDANCE SHEET ─────────────────────────────── -->
  <div id="sheet">
    <div id="sheet-handle" onclick="toggleSheet()"></div>
    <div id="sheet-header">
      <div id="sheet-title">Today's Attendance</div>
      <div id="sheet-badge">0</div>
    </div>
    <div id="feed-list">
      <div class="feed-empty" id="feed-empty">No one marked yet</div>
    </div>
  </div>

</div><!-- #app -->

<!-- ─── TOAST ─────────────────────────────────────────────── -->
<div id="toast">
  <span id="toast-icon"></span>
  <span id="toast-msg"></span>
</div>

<script>
// ─── SERVICE WORKER ───────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/presab/sw.js')
    .then(() => console.log('[Presab] SW registered'))
    .catch(e => console.log('[Presab] SW error', e));
}

// ─── INSTALL PROMPT ───────────────────────────────────────
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  if (!sessionStorage.getItem('presab_install_dismissed')) {
    document.getElementById('install-bar').style.display = 'flex';
  }
});
document.getElementById('btn-install').addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') toast('✓', 'Presab added to home screen');
  deferredInstall = null;
  document.getElementById('install-bar').style.display = 'none';
});
document.getElementById('btn-dismiss-install').addEventListener('click', () => {
  document.getElementById('install-bar').style.display = 'none';
  sessionStorage.setItem('presab_install_dismissed', '1');
});

// ─── STATE ────────────────────────────────────────────────
const BACKEND   = 'http://localhost:5050';
const VALID_CODES = ['PRESAB2026'];   // fallback — real codes from backend
let stream      = null;
let facingMode  = 'user';  // front camera by default (selfie = students walk in front)
let running     = false;
let socket      = null;
let backendOK   = false;
let attendance  = [];
let sheetOpen   = false;
let toastTimer  = null;

// ─── GATE ─────────────────────────────────────────────────
async function unlock() {
  const code = document.getElementById('gate-code').value.trim().toUpperCase();
  if (!code) { document.getElementById('gate-err').textContent = 'Enter your access code.'; return; }

  // Try backend first
  try {
    const r = await fetch(`${BACKEND}/api/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
      signal: AbortSignal.timeout(2500)
    });
    const d = await r.json();
    if (d.valid) { grantAccess(d.label || 'Teacher'); return; }
    document.getElementById('gate-err').textContent = 'Invalid code. Try again.';
    return;
  } catch {
    // Backend offline — fall back to bundled codes
    if (VALID_CODES.includes(code)) { grantAccess('Teacher'); return; }
    document.getElementById('gate-err').textContent = 'Invalid code. Try again.';
  }
}

function grantAccess(label) {
  sessionStorage.setItem('presab_auth', '1');
  sessionStorage.setItem('presab_label', label);
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

if (sessionStorage.getItem('presab_auth') === '1') {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

// ─── INIT ─────────────────────────────────────────────────
function initApp() {
  const now = new Date();
  document.getElementById('hud-date').textContent =
    now.toLocaleDateString('en-TT', { weekday:'long', day:'numeric', month:'short' });
  const label = sessionStorage.getItem('presab_label') || 'Teacher';
  document.getElementById('hud-class').textContent = label;
  setTimeout(tryConnectEngine, 600);
}

// ─── ENGINE (Flask + SocketIO backend) ───────────────────
function tryConnectEngine() {
  if (typeof io === 'undefined') { loadSocketIO(); return; }
  connectSocket();
}

function loadSocketIO() {
  const s = document.createElement('script');
  s.src = BACKEND + '/socket.io/socket.io.js';
  s.onload = connectSocket;
  s.onerror = () => toast('ℹ', 'Running in standalone mode — engine not connected', 4000);
  document.head.appendChild(s);
}

function connectSocket() {
  if (socket) return;
  try {
    socket = io(BACKEND, { transports: ['websocket'], timeout: 3000 });
    socket.on('connect', () => {
      backendOK = true;
      document.getElementById('engine-pill').style.display = 'inline-flex';
      document.getElementById('btn-engine').classList.add('active');
      toast('▲', 'Engine connected — live recognition active');
    });
    socket.on('disconnect', () => {
      backendOK = false;
      document.getElementById('engine-pill').style.display = 'none';
      document.getElementById('btn-engine').classList.remove('active');
      toast('!', 'Engine disconnected');
    });
    socket.on('attendance_event', person => markAttendance(person));
  } catch(e) {
    toast('!', 'Could not connect to engine');
  }
}

function connectEngine() {
  if (backendOK) {
    toast('✓', 'Already connected to engine');
    return;
  }
  toast('…', 'Connecting to engine...');
  loadSocketIO();
}

// ─── CAMERA ───────────────────────────────────────────────
async function toggleCamera() {
  if (running) { stopCamera(); return; }
  await startCamera();
}

async function startCamera() {
  const constraints = {
    video: { facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
    audio: false
  };
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    const vid = document.getElementById('cam-video');
    vid.srcObject = stream;
    vid.style.display = 'block';
    // Mirror logic: front cam mirror, rear cam no mirror
    vid.style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
    document.getElementById('cam-canvas').style.transform = facingMode === 'user' ? 'scaleX(-1)' : 'none';
    document.getElementById('cam-placeholder').style.display = 'none';
    document.getElementById('scan-frame').style.display = 'block';
    document.getElementById('btn-capture').classList.add('active');
    document.getElementById('ico-start').style.display = 'none';
    document.getElementById('ico-stop').style.display = 'block';
    running = true;

    // If backend running, tell it to start the engine too
    if (backendOK) {
      fetch(`${BACKEND}/api/engine/start`, { method: 'POST' }).catch(() => {});
      toast('▶', 'Camera on — engine scanning');
    } else {
      toast('▶', 'Camera on — standalone mode');
    }
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      toast('✕', 'Camera permission denied');
    } else if (e.name === 'OverconstrainedError') {
      // Try again without constraints
      facingMode = 'environment';
      await startCamera();
    } else {
      toast('✕', 'Cannot access camera');
    }
  }
}

function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (backendOK) fetch(`${BACKEND}/api/engine/stop`, { method: 'POST' }).catch(() => {});
  document.getElementById('cam-video').style.display = 'none';
  document.getElementById('cam-placeholder').style.display = 'flex';
  document.getElementById('scan-frame').style.display = 'none';
  document.getElementById('btn-capture').classList.remove('active');
  document.getElementById('ico-start').style.display = 'block';
  document.getElementById('ico-stop').style.display = 'none';
  running = false;
  toast('■', 'Camera stopped');
}

async function flipCamera() {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  if (running) await startCamera();
  toast('↺', facingMode === 'user' ? 'Front camera' : 'Rear camera');
}

// ─── ATTENDANCE ───────────────────────────────────────────
function markAttendance(person) {
  // Dedupe — same person only once per session
  if (attendance.find(a => a.id === person.id)) return;
  attendance.push(person);

  // Update counters
  const count = attendance.length;
  document.getElementById('hud-count').textContent = count;
  document.getElementById('sheet-badge').textContent = count;

  // Add to feed
  const empty = document.getElementById('feed-empty');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'feed-item';
  item.innerHTML = `
    <div class="fi-avatar">${person.name.charAt(0)}</div>
    <div class="fi-info">
      <div class="fi-name">${person.name}</div>
      <div class="fi-role">${person.role || 'student'} · ${person.id}</div>
    </div>
    <div class="fi-time">${person.time || now()}</div>
  `;
  document.getElementById('feed-list').prepend(item);

  // Brief toast
  toast('✓', `${person.name} marked present`);
}

function now() {
  return new Date().toLocaleTimeString('en-TT', { hour:'2-digit', minute:'2-digit' });
}

// ─── SHEET ────────────────────────────────────────────────
function toggleSheet() {
  sheetOpen = !sheetOpen;
  document.getElementById('sheet').classList.toggle('open', sheetOpen);
}

// ─── EXPORT ───────────────────────────────────────────────
function exportLog() {
  if (backendOK) {
    // Download from engine (full server-side log)
    const a = document.createElement('a');
    a.href = `${BACKEND}/api/export`;
    a.download = 'presab_attendance.csv';
    a.click();
    toast('✓', 'Downloading from engine');
    return;
  }
  if (!attendance.length) { toast('!', 'No records to export'); return; }
  const d  = new Date().toLocaleDateString('en-TT');
  const rows = [['ID','Name','Role','Time','Date','Status'],
    ...attendance.map(r => [r.id, r.name, r.role||'student', r.time||now(), d, 'Present'])
  ];
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `presab_${d.replace(/\//g,'-')}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('✓', 'CSV exported');
}

// ─── TOAST ────────────────────────────────────────────────
function toast(icon, msg, dur = 2800) {
  clearTimeout(toastTimer);
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent  = msg;
  document.getElementById('toast').classList.add('show');
  toastTimer = setTimeout(() => document.getElementById('toast').classList.remove('show'), dur);
}

// ─── KEEP SCREEN AWAKE (Wake Lock API) ───────────────────
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('[Presab] Screen wake lock active');
    } catch(e) {
      console.log('[Presab] Wake lock unavailable:', e.message);
    }
  }
}
document.addEventListener('visibilitychange', async () => {
  if (wakeLock !== null && document.visibilityState === 'visible') {
    await requestWakeLock();
  }
});
requestWakeLock();

// ─── KEYBOARD ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && sheetOpen) toggleSheet();
});
</script>
