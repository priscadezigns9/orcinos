<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Connector</title>
    <link rel="stylesheet" href="../shared/style.css">
</head>
<body>
    <a href="tel:911" class="emergency-btn">EMERGENCY HELP</a>

    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-item">Home</a>
        <a href="ask-syla.html" class="nav-item">Ask Syla</a>
        <a href="medications.html" class="nav-item">Medicine</a>
        <a href="family.html" class="nav-item active">Family</a>
        <a href="tech-help.html" class="nav-item">Tech Help</a>
    </nav>

    <div class="container">
        <h1>My Family</h1>
        <p>Press a button to send a message to your family letting them know you are okay.</p>
        
        <div id="family-list">
            <!-- Example contact -->
            <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <strong>Son (John)</strong><br>
                    <span>+1234567890</span>
                </div>
                <button onclick="sendFamilyMessage('1234567890')" class="big-btn big-btn-green" style="width: auto; padding: 0 30px;">I'm Okay!</button>
            </div>
        </div>

        <div class="card">
            <h2>Add New Family Member</h2>
            <input type="text" id="family-name" placeholder="Name (e.g. Daughter)">
            <input type="text" id="family-phone" placeholder="Phone Number">
            <button onclick="addFamilyMember()" class="big-btn">Add to List</button>
        </div>
    </div>

    <script>
        function addFamilyMember() {
            const name = document.getElementById('family-name').value;
            const phone = document.getElementById('family-phone').value;
            if (!name || !phone) return;

            const div = document.createElement('div');
            div.className = 'card';
            div.style.display = 'flex';
            div.style.justifyContent = 'space-between';
            div.style.alignItems = 'center';
            div.innerHTML = `
                <div>
                    <strong>${name}</strong><br>
                    <span>${phone}</span>
                </div>
                <button onclick="sendFamilyMessage('${phone}')" class="big-btn big-btn-green" style="width: auto; padding: 0 30px;">I'm Okay!</button>
            `;
            document.getElementById('family-list').appendChild(div);
            
            document.getElementById('family-name').value = '';
            document.getElementById('family-phone').value = '';
        }
    </script>
    <script src="../../shared/openai-client.js"></script>
    <script src="../shared/app.js"></script>
</body>
</html>
