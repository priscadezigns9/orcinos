<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Terminal | Sovereign Analysis</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        #tradingview_terminal { height: 100vh; width: 100vw; }
    </style>
</head>
<body>
    <div id="tradingview_terminal"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        const urlParams = new URLSearchParams(window.location.search);
        const symbol = urlParams.get('symbol') || 'BINANCE:BTCUSDT';
        new TradingView.widget({
            "autosize": true,
            "symbol": symbol,
            "interval": "1",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "watchlist": ["BINANCE:BTCUSDT","BINANCE:ETHUSDT","NASDAQ:AAPL","NASDAQ:TSLA","FX:EURUSD","FX:GBPUSD","OANDA:XAUUSD","INDEX:DXY"],
            "details": true,
            "hotlist": true,
            "calendar": true,
            "show_popup_button": true,
            "container_id": "tradingview_terminal"
        });
    </script>
</body>
</html>
