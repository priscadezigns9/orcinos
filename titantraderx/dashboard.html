<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="../logos/TITAN_ICON.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Dashboard | Sovereign Control</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00A36C;
            --bg: #0A0A0B;
            --surface: #161618;
            --text: #FFFFFF;
            --muted: #A0A0A5;
            --border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
        }
        .auth-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo-box { margin-bottom: 30px; }
        .logo-box img { height: 45px; }
        h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.95rem; }
        
        form { text-align: left; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); border-radius: 12px; color: #fff; outline: none; 
        }
        
        .btn-enter { 
            width: 100%; padding: 16px; background: var(--primary); color: #fff; 
            border: none; border-radius: 12px; font-weight: 800; cursor: pointer; 
        }
        
        #user-profile { display: none; }
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .nav-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 20px; border-radius: 16px;
            text-decoration: none; color: #fff;
            font-weight: 600; font-size: 0.9rem;
            transition: all 0.2s;
            text-align: center;
        }
        .nav-item:hover { background: var(--primary); border-color: var(--primary); }
        
        footer { margin-top: 30px; color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="auth-card" id="auth-ui">
        <div class="logo-box">
            <a href="index.html"><img src="../logos/TITAN_TRADERX_LOGO.png" alt="TITAN TRADERX"></a>
        </div>
        <h1>Sovereign Access</h1>
        <p>Institutional login for the Orcinos terminal.</p>
        
        <form id="login-form">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="trader@orcinos.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button type="button" class="btn-enter" onclick="handleLogin()">SIGN IN</button>
                <button type="button" class="btn-enter" style="background: #161618; border: 1px solid var(--border);" onclick="handleSignUp()">SIGN UP</button>
            </div>
        </form>
    </div>

    <div class="auth-card" id="user-profile">
        <div class="logo-box">
            <img src="../logos/TITAN_TRADERX_LOGO.png" alt="TITAN TRADERX">
        </div>
        <h3 id="user-display">Sovereign Trader</h3>
        <p id="user-email-display" style="font-size: 0.8rem; margin-top: 5px;"></p>
        
        <div class="nav-grid">
            <a href="charts.html" class="nav-item">TERMINAL</a>
            <a href="academy.html" class="nav-item">ACADEMY</a>
            <a href="prop-firms.html" class="nav-item">PARTNERS</a>
            <a href="#" onclick="handleLogout()" class="nav-item" style="color:#FF4B4B;">LOGOUT</a>
        </div>
    </div>

    <script>
        // Supabase configuration
        const _supabase = supabase.createClient('https://zqxsvxtshqxvxpxvxpxv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...');

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert('Sovereign account initiated. Check email for confirmation.');
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-display').innerText = session.user.email.split('@')[0].toUpperCase();
                document.getElementById('user-email-display').innerText = session.user.email;
            }
        });
    </script>
    
    <footer>
        <img src="../logos/TITAN_ICON.png" alt="Orcinos" style="height: 30px; margin-bottom: 10px; display: block; margin-left: auto; margin-right: auto;">
        &copy; 2026 Orcinos Division.
    </footer>
</body>
</html>
