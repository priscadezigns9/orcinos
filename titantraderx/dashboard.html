<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Access | Titan Trader X</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00A36C;
            --bg: #0A0A0B;
            --surface: #161618;
            --text: #FFFFFF;
            --muted: #A0A0A5;
            --border: rgba(255,255,255,0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; align-items: center; justify-content: center; 
            min-height: 100vh;
        }
        .auth-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo-text { font-weight: 800; font-size: 1.6rem; color: #FFFFFF; margin-bottom: 30px; display: block; text-decoration: none; }
        .logo-span { color: var(--primary); }
        
        h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
        p { color: var(--muted); margin-bottom: 30px; font-size: 0.9rem; }
        
        form { text-align: left; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 14px; 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--border); 
            border-radius: 12px; color: #fff; 
            outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: var(--primary); }
        
        .btn-enter {
            width: 100%; padding: 16px; 
            background: var(--primary); color: #fff; 
            border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; 
            margin-top: 10px; transition: transform 0.2s;
        }
        .btn-enter:hover { transform: translateY(-2px); }

        #user-profile { display: none; }
        .profile-header { display: flex; align-items: center; gap: 15px; text-align: left; margin-bottom: 30px; }
        .profile-header img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--primary); }
        
        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nav-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            padding: 20px; border-radius: 16px;
            text-decoration: none; color: #fff;
            font-weight: 700; font-size: 0.8rem;
            transition: all 0.2s; text-align: center;
        }
        .nav-item:hover { background: var(--primary); border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="auth-card" id="auth-ui">
        <a href="index.html" class="logo-text">TITAN <span class="logo-span">TRADERX</span></a>
        <h1>Sovereign Access</h1>
        <p>Enter your credentials to access the terminal.</p>
        
        <form id="login-form">
            <div class="input-group">
                <label>Username / Email</label>
                <input type="email" id="email" placeholder="trader@sovereign.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button type="button" class="btn-enter" onclick="handleLogin()">ENTER TERMINAL</button>
        </form>
    </div>

    <div class="auth-card" id="user-profile">
        <div class="profile-header">
            <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Trader" alt="">
            <div>
                <h3 id="user-name">Sovereign Trader</h3>
                <p id="user-email" style="margin:0; font-size:0.75rem; color:var(--muted);"></p>
            </div>
        </div>
        <div class="nav-grid">
            <a href="charts.html" class="nav-item">TERMINAL</a>
            <a href="academy.html" class="nav-item">ACADEMY</a>
            <a href="prop-firms.html" class="nav-item">PARTNERS</a>
            <a href="#" onclick="handleLogout()" class="nav-item" style="color:#FF4B4B;">LOGOUT</a>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://zqxsvxtshqxvxpxvxpxv.supabase.co'; 
        const supabaseKey = 'public-anon-key'; 
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                document.getElementById('auth-ui').style.display = 'none';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-name').innerText = session.user.user_metadata.full_name || 'Sovereign Trader';
                document.getElementById('user-email').innerText = session.user.email;
                if(session.user.user_metadata.avatar_url) {
                    document.getElementById('user-avatar').src = session.user.user_metadata.avatar_url;
                }
            }
        });
    </script>
</body>
</html>
