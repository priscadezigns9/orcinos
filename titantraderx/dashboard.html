    <link rel="icon" href="../logos/TITAN_ICON.png" type="image/png">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
        function toggleMenu() {
            const nav = document.querySelector('nav');
            const hamburger = document.querySelector('.hamburger');
            nav.classList.toggle('nav-active');
            
            const lines = hamburger.querySelectorAll('div');
            if (nav.classList.contains('nav-active')) {
                lines[0].style.transform = 'rotate(-45deg) translate(-5px, 6px)';
                lines[1].style.opacity = '0';
                lines[2].style.transform = 'rotate(45deg) translate(-5px, -6px)';
            } else {
                lines[0].style.transform = 'none';
                lines[1].style.opacity = '1';
                lines[2].style.transform = 'none';
            }
        }

            height: 70px;
        }
        .logo-container { display: flex; align-items: center; }
        .logo-container img { height: 30px; width: auto; }
        
        nav { display: flex; gap: 25px; align-items: center; }
        nav a {
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 0.85rem;
            transition: 0.3s;
            opacity: 0.7;
            white-space: nowrap;
        }
        nav a:hover { opacity: 1; color: var(--malachite); }
        
        .hamburger {

            flex-direction: column; 
            gap: 6px; 
            padding: 10px;
            z-index: 2001;
        }
        .hamburger div { width: 24px; height: 2px; background-color: #fff; transition: 0.3s; }

        @media screen and (max-width: 968px) {

        const supabaseUrl = 'https://sazhdnqzaxppcralmthh.supabase.co'; // Updated with provided URL from history summary if available, else placeholder

        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function signIn() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) showError(error.message);
        }

        async function signUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabase.auth.signUp({ email, password });
            if (error) showError(error.message);
            else alert('Account created successfully! You can now log in.');
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.reload();
        }

        function showError(msg) {
            const err = document.getElementById('error-message');
            err.innerText = msg;
            err.style.display = 'block';
        }

        supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                window.location.href = 'terminal.html';
                document.getElementById('user-profile').style.display = 'block';
                document.getElementById('user-email').innerText = session.user.email;
                document.getElementById('user-initials').innerText = session.user.email[0].toUpperCase();
            }
        });
    
        function toggleMenu() {
            const nav = document.querySelector('nav');

            } else {
                lines[0].style.transform = 'none';
                lines[1].style.opacity = '1';
                lines[2].style.transform = 'none';
            }
        }
    </script>
