<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='icon' href='../logos/TITAN_ICON.png' type='image/png'>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Titan Terminal | Institutional Workspace</title>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg: #050505; --surface: #0F0F11; --text: #FFFFFF; --muted: #888; --malachite: #00FF7F; --border: rgba(255,255,255,0.05);
            --error: #ff4d4d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo img { height: 24px; width: auto; border-radius: 6px; border-radius: 50%; }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        .user-pill { 
            background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            padding: 6px 12px; border-radius: 100px; display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem; font-weight: 600;
        }
        .status-dot { width: 8px; height: 8px; background: var(--malachite); border-radius: 50%; box-shadow: 0 0 10px var(--malachite); }
        
        .btn-exit { 
            background: transparent; border: 1px solid var(--border); color: var(--muted); 
            padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.75rem; 
            font-weight: 800; transition: 0.3s;
        }
        .btn-exit:hover { border-color: var(--error); color: var(--error); background: rgba(255,77,77,0.05); }
        
        .workspace { display: grid; grid-template-columns: 260px 1fr 300px; flex-grow: 1; overflow: hidden; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; }
        .main-terminal { background: #000; position: relative; border-right: 1px solid var(--border); }
        .watchlist { background: var(--surface); padding: 20px; display: flex; flex-direction: column; }
        
        h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 20px; font-weight: 800; }
        .nav-item { padding: 12px; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; color: var(--muted); margin-bottom: 5px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: var(--white); }
        .nav-item.active { color: var(--malachite); background: rgba(0,255,127,0.05); }

        .watchlist-container { flex-grow: 1; overflow-y: auto; }
        .watchlist-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-radius: 10px; margin-bottom: 5px; 
            background: rgba(255,255,255,0.01); border: 1px solid transparent; transition: 0.2s;
        }
        .watchlist-item:hover { background: rgba(255,255,255,0.03); border-color: var(--border); }
        .symbol { font-weight: 700; font-size: 0.85rem; }
        .price { font-family: monospace; font-weight: 600; color: var(--malachite); }
        .remove-btn { opacity: 0; cursor: pointer; color: var(--error); font-size: 0.8rem; transition: 0.3s; }
        .watchlist-item:hover .remove-btn { opacity: 1; }

        .add-symbol-box { margin-top: 20px; display: flex; gap: 8px; }
        .add-input { 
            flex-grow: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border); 
            border-radius: 8px; padding: 10px; color: #fff; font-size: 0.8rem; outline: none;
        }
        .add-input:focus { border-color: var(--malachite); }
        .add-btn { background: var(--malachite); color: #000; border: none; padding: 0 15px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        @media screen and (max-width: 1200px) {
            .workspace { grid-template-columns: 200px 1fr 250px; }
        }
        @media screen and (max-width: 968px) {
            .workspace { grid-template-columns: 1fr; overflow-y: auto; }
            .sidebar, .watchlist { display: none; }
            .main-terminal { height: 80vh; }
            body { overflow-y: auto; }
        }
    
        .nav-item i { width: 18px; height: 18px; }
        .nav-item span { margin-left: 10px; }
    
        .watchlist-container { display: flex; flex-direction: column; height: 100%; }
        .watchlist-header { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-box { position: relative; width: 100%; }
        .search-box input { 
            width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); 
            padding: 10px 35px 10px 15px; border-radius: 8px; color: #fff; font-size: 0.8rem;
        }
        .search-box i { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; }
        
        .asset-list { flex: 1; overflow-y: auto; padding: 10px 0; }
        .asset-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 8px 15px; cursor: pointer; transition: 0.2s;
        }
        .asset-row:hover { background: rgba(255,255,255,0.03); }
        .asset-info { display: flex; flex-direction: column; }
        .asset-symbol { font-weight: 700; font-size: 0.85rem; }
        .asset-name { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
        .asset-actions { display: flex; align-items: center; gap: 10px; }
        .star-btn { cursor: pointer; color: var(--muted); transition: 0.2s; }
        .star-btn.active { color: #f1c40f; }
        .star-btn:hover { transform: scale(1.2); }
        
        .watchlist-items { border-top: 2px solid var(--border); padding-top: 10px; }
        .watchlist-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); padding: 5px 15px; text-transform: uppercase; }
    </style>
<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <header>
        <div class='header-left'>
            <a href='index.html' class='logo'><img src='../logos/TITAN_ICON.png' alt='Titan'></a>
            <h2 style='font-size: 0.9rem; font-weight: 800; letter-spacing: 1px;'>TERMINAL</h2>
        </div>
        <div class='header-right'>
            <div class='user-pill'>
                <div class='status-dot'></div>
                <span id='user-email'>...</span>
            </div>
            <button class='btn-exit' onclick='logout()'>LOGOUT</button>
        </div>

    <div class='workspace'>
                        <aside class='sidebar'>
            <h3>Navigation</h3>
            <div class='nav-item active' onclick='window.location.reload()'>
                <i data-lucide='layout-dashboard'></i> <span>Charts</span>
            </div>
            <div class='nav-item' onclick='window.location.href="academy.html"'>
                <i data-lucide='book-open'></i> <span>Academy</span>
            </div>
            <div class='nav-item' onclick='window.location.href="partners.html"'>
                <i data-lucide='users'></i> <span>Partners</span>
            </div>
            
            <h3 style='margin-top: 30px;'>Workspace</h3>
            <div class='nav-item' onclick='window.open("risk-calculator.html", "_blank")'>
                <i data-lucide='calculator'></i> <span>Risk Calc</span>
            </div>
            <div class='nav-item' onclick='window.open("market-intelligence.html", "_blank")'>
                <i data-lucide='brain'></i> <span>Neural Desk</span>
            </div>
        </aside>

        <main class='main-terminal'>
            <div id='tv_chart_container' style='height: 100%; width: 100%;'></div>
        </main>

        <aside class='watchlist'>
            <h3>Watchlist</h3>
            <div class='watchlist-container' id='watchlist-items'>
                <!-- Symbols injected here -->
            </div>
            <div class='add-symbol-box'>
                <input type='text' id='symbol-input' class='add-input' placeholder='BTCUSDT'>
                <button class='add-btn' onclick='addSymbol()'>+</button>
            </div>
        </aside>
    </div>

        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let tvWidget = null;

                _supabase.auth.onAuthStateChange((event, session) => {
            if (session) { 
                currentUser = session.user;
                document.getElementById("user-email").innerText = currentUser.email.split("@")[0];
                loadWatchlist();
            } else {
                document.getElementById("user-email").innerText = "GUEST";

        });

        function initChart(symbol) {
            tvWidget = new TradingView.widget({
              'autosize': true,

              'theme': 'dark',
              'style': '1',
              'locale': 'en',

              'enable_publishing': false,
              'hide_side_toolbar': false,

            { symbol: 'AAPL', name: 'Apple Inc.', type: 'stock' },
            { symbol: 'NVDA', name: 'Nvidia Corp', type: 'stock' }
        ];

        function initMarketList() {
            const container = document.getElementById('market-assets');
            container.innerHTML = '';
            MARKET_ASSETS.forEach(asset => {
                const isSaved = savedSymbols.includes(asset.symbol);
                const row = document.createElement('div');
                row.className = 'asset-row';
                row.innerHTML = `
                    <div class='asset-info' onclick='initChart("BINANCE:" + "${asset.symbol}")'>
                        <span class='asset-symbol'>${asset.symbol}</span>
                        <span class='asset-name'>${asset.name}</span>
                    </div>
                    <div class='asset-actions'>
                        <i data-lucide='star' class='star-btn ${isSaved ? 'active' : ''}' onclick='toggleWatchlist("${asset.symbol}")'></i>
                    </div>
                `;
                container.appendChild(row);
            });
            lucide.createIcons();
        }

        function filterAssets() {
            const query = document.getElementById('asset-search').value.toUpperCase();
            const rows = document.querySelectorAll('#market-assets .asset-row');
            rows.forEach(row => {
                const sym = row.querySelector('.asset-symbol').innerText;
                row.style.display = sym.includes(query) ? 'flex' : 'none';
            });
        }

        let savedSymbols = [];
        async function loadWatchlist() {
            const container = document.getElementById('watchlist-items');
            container.innerHTML = '';
            
            if (!currentUser) {
                savedSymbols = ['BTCUSDT', 'ETHUSDT', 'XAUUSD'];
            } else {
                const { data } = await _supabase.from('user_watchlists').select('symbol').eq('user_id', currentUser.id);
                savedSymbols = data ? data.map(i => i.symbol) : [];
            }
            
            savedSymbols.forEach(symbol => {
                const row = document.createElement('div');
                row.className = 'asset-row';
                row.innerHTML = `
                    <div class='asset-info' onclick='initChart("BINANCE:" + "${symbol}")'>
                        <span class='asset-symbol'>${symbol}</span>
                        <span class='price' style='color:var(--malachite); font-size:0.7rem;'>LIVE</span>
                    </div>
                    <div class='asset-actions'>
                        <i data-lucide='x' style='width:14px; cursor:pointer; color:var(--muted);' onclick='toggleWatchlist("${symbol}")'></i>
                    </div>
                `;
                container.appendChild(row);
            });
            initMarketList();
        }

        async function toggleWatchlist(symbol) {
            if (!currentUser) {
                alert("Login to sync your star-list across the Orcinos Network.");
                return;
            }
            
            if (savedSymbols.includes(symbol)) {
                await _supabase.from('user_watchlists').delete().eq('user_id', currentUser.id).eq('symbol', symbol);
            } else {
                await _supabase.from('user_watchlists').insert([{ user_id: currentUser.id, symbol: symbol }]);
            }
            loadWatchlist();
        }

                .from('user_watchlists')
                .select('*')
                .eq('user_id', currentUser.id);
            
            const container = document.getElementById('watchlist-items');
            container.innerHTML = '';
            
            if (data && data.length > 0) {
                data.forEach(item => {
                    renderSymbol(item.symbol, item.id);
                });
            } else {
                ['BTCUSDT', 'ETHUSDT'].forEach(s => renderSymbol(s, null));
            }
        }

        ")' style='cursor:pointer;'>${displaySymbol}</span>
                <span class='price' style='color:var(--malachite);'>LIVE</span>
                ${id ? `<span class='remove-btn' onclick='removeSymbol("${id}", "${symbol}")'>✕</span>` : ''}
            `;
            document.getElementById('watchlist-items').appendChild(div);
        }

        
            const input = document.getElementById('symbol-input');
            const symbol = input.value.toUpperCase().trim();
            if (!symbol) return;

            const { data, error } = await _supabase
                .from('user_watchlists')
                .insert([{ user_id: currentUser.id, symbol: symbol }]);
            
            input.value = '';
            loadWatchlist();
        }

        
            loadWatchlist();
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'dashboard.html';
        }
    </script>
<script>lucide.createIcons();</script>

</html>
