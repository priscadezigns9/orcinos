<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='icon' href='../logos/TITAN_ICON.png' type='image/png'>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Titan Terminal | Sovereign Workspace</title>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg: #050505; --surface: #0F0F11; --text: #FFFFFF; --muted: #888; --malachite: #00FF7F; --border: rgba(255,255,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .user-badge { background: var(--malachite); color: #000; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; }
        
        .workspace { display: grid; grid-template-columns: 280px 1fr 300px; flex-grow: 1; }
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 20px; }
        .main-terminal { background: #000; position: relative; }
        .watchlist { background: var(--surface); border-left: 1px solid var(--border); padding: 20px; }
        
        h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 15px; }
        .nav-item { padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; color: var(--muted); margin-bottom: 5px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: var(--white); }
        .nav-item.active { border-left: 3px solid var(--malachite); color: var(--malachite); }

        .btn-logout { background: transparent; border: 1px solid #ff4d4d; color: #ff4d4d; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
    
        @media screen and (max-width: 968px) {
            .workspace { grid-template-columns: 1fr; overflow-y: auto; height: auto; }
            .sidebar, .watchlist { display: none; } /* Hide sidebars on mobile for focus */
            .main-terminal { height: 70vh; }
            body { overflow-y: auto; height: auto; }
        }
</style>
</head>
<body>
    <header>
        <div class='logo'><img src='../logos/TITAN_TRADERX_LOGO.png' style='height: 30px;'></div>
        <div class='user-info'>
            <span class='user-badge'>SOVEREIGN TIER</span>
            <span id='user-email' style='font-size: 0.85rem; opacity: 0.7;'>...</span>
            <button class='btn-logout' onclick='logout()'>EXIT</button>
        </div>
    </header>

    <div class='workspace'>
        <aside class='sidebar'>
            <h3>Saved Setups</h3>
            <div class='nav-item active'>Intraday Scalp v1</div>
            <div class='nav-item'>Liquidity Sweep Core</div>
            <div class='nav-item'>Order Flow High-Fi</div>
            
            <h3 style='margin-top: 30px;'>Tools</h3>
            <div class='nav-item'>Neural Analysis</div>
            <div class='nav-item'>Risk Calculator</div>
            <div class='nav-item'>Prop-Firm Sync</div>
        </aside>

        <main class='main-terminal'>
            <div id='tv_chart_container' style='height: 100%; width: 100%;'></div>
            <script type='text/javascript' src='https://s3.tradingview.com/tv.js'></script>
            <script type='text/javascript'>
            new TradingView.widget({
              'autosize': true, 'symbol': 'BINANCE:BTCUSDT', 'interval': '60', 'theme': 'dark', 'style': '1', 'locale': 'en', 'container_id': 'tv_chart_container', 'enable_publishing': false, 'hide_side_toolbar': false, 'allow_symbol_change': true, 'save_image': false
            });
            </script>
        </main>

        <aside class='watchlist'>
            <h3>Watchlist</h3>
            <div id='watchlist-items'>
                <div style='display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border);'>
                    <span>BTC/USDT</span><span style='color: var(--malachite);'>9,430</span>
                </div>
                <div style='display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border);'>
                    <span>ETH/USDT</span><span style='color: var(--malachite);'>,842</span>
                </div>
            </div>
            <button style='width: 100%; padding: 10px; margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px dashed var(--border); color: var(--muted); border-radius: 8px;'>+ Add Symbol</button>
        </aside>
    </div>

    <script>
        const supabase = supabase.createClient('https://sazhdnqzaxppcralmthh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc');
        
        supabase.auth.onAuthStateChange((event, session) => {
            if (!session) { window.location.href = 'dashboard.html'; }
            else { document.getElementById('user-email').innerText = session.user.email; }
        });

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
