<!DOCTYPE html>
<html lang='en'>
<head>
    <link rel='icon' href='../logos/TITAN_ICON.png' type='image/png'>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Titan Terminal | Institutional Workspace</title>
    <script src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2'></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <link href='https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap' rel='stylesheet'>
    <style>
        :root {
            --bg: #050505; --surface: #0F0F11; --text: #FFFFFF; --muted: #888; --malachite: #00FF7F; --border: rgba(255,255,255,0.05);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; z-index: 1000; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo img { height: 24px; width: auto; border-radius: 50%; }
        
        .header-right { display: flex; align-items: center; gap: 15px; }
        .user-pill { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 6px 15px; border-radius: 100px; font-size: 0.75rem; font-weight: 600; color: var(--muted); }
        .logout-btn { background: none; border: none; color: #ff4d4d; font-weight: 800; cursor: pointer; font-size: 0.75rem; }

        main { flex: 1; display: flex; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; }
        .sidebar h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); padding: 0 20px; margin-bottom: 15px; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.03); color: #fff; }
        .nav-item i { width: 18px; height: 18px; }

        /* Chart Center */
        .chart-center { flex: 1; background: #000; position: relative; }
        #tv_chart_container { height: 100%; width: 100%; }

        /* Watchlist Right */
        .watchlist-sidebar { width: 280px; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .watchlist-header { padding: 15px; border-bottom: 1px solid var(--border); }
        .search-box { position: relative; width: 100%; }
        .search-box input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 10px 35px 10px 15px; border-radius: 8px; color: #fff; font-size: 0.8rem; outline: none; }
        .search-box i { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 14px; }
        
        .watchlist-label { font-size: 0.65rem; font-weight: 800; color: var(--muted); padding: 15px 15px 5px; text-transform: uppercase; letter-spacing: 1px; }
        .asset-list { flex: 1; overflow-y: auto; padding-bottom: 20px; }
        .asset-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .asset-row:hover { background: rgba(255,255,255,0.03); }
        .asset-info { display: flex; flex-direction: column; flex: 1; }
        .asset-symbol { font-weight: 700; font-size: 0.85rem; color: #fff; }
        .asset-name { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
        .star-btn { cursor: pointer; color: var(--muted); transition: 0.2s; width: 16px; }
        .star-btn.active { color: #f1c40f; fill: #f1c40f; }
    </style>
</head>
<body>
    <header>
        <div class='header-left'>
            <a href='index.html' class='logo'><img src='../logos/TITAN_TRADERX_LOGO.png'></a>
            <div class='user-pill'>Institutional Desk: <span id='user-email'>GUEST</span></div>
        </div>
        <div class='header-right'>
            <button class='logout-btn' onclick='logout()'>LOGOUT</button>
        </div>
    </header>

    <main>
        <aside class='sidebar'>
            <h3>Navigation</h3>
            <div class='nav-item active' onclick='window.location.reload()'>
                <i data-lucide='layout-dashboard'></i> <span>Charts</span>
            </div>
            <div class='nav-item' onclick='window.location.href="academy.html"'>
                <i data-lucide='book-open'></i> <span>Academy</span>
            </div>
            <div class='nav-item' onclick='window.location.href="partners.html"'>
                <i data-lucide='users'></i> <span>Partners</span>
            </div>
            
            <h3 style='margin-top: 30px;'>Workspace</h3>
            <div class='nav-item' onclick='window.open("risk-calculator.html", "_blank")'>
                <i data-lucide='calculator'></i> <span>Risk Calc</span>
            </div>
            <div class='nav-item' onclick='window.open("market-intelligence.html", "_blank")'>
                <i data-lucide='brain'></i> <span>Neural Desk</span>
            </div>
        </aside>

        <section class='chart-center'>
            <div id='tv_chart_container'></div>
        </section>

        <aside class='watchlist-sidebar'>
            <div class='watchlist-header'>
                <div class='search-box'>
                    <input type='text' id='asset-search' placeholder='Search pairs, stocks...' onkeyup='filterAssets()'>
                    <i data-lucide='search'></i>
                </div>
            </div>
            
            <div class='watchlist-label'>Market Assets</div>
            <div class='asset-list' id='market-assets'></div>
            
            <div class='watchlist-label' style="border-top: 1px solid var(--border); padding-top: 20px;">My Watchlist</div>
            <div class='asset-list' id='watchlist-items'></div>
        </aside>
    </main>

    <script>
        const supabaseUrl = 'https://sazhdnqzaxppcralmthh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
        
        let currentUser = null;
        let tvWidget = null;
        let savedSymbols = [];

        const MARKET_ASSETS = [
            { symbol: 'BTCUSDT', name: 'Bitcoin / Tether' },
            { symbol: 'ETHUSDT', name: 'Ethereum / Tether' },
            { symbol: 'SOLUSDT', name: 'Solana / Tether' },
            { symbol: 'XAUUSD', name: 'Gold / US Dollar' },
            { symbol: 'GBPUSD', name: 'British Pound / USD' },
            { symbol: 'EURUSD', name: 'Euro / US Dollar' },
            { symbol: 'NAS100', name: 'Nasdaq 100' },
            { symbol: 'US30', name: 'Dow Jones 30' },
            { symbol: 'TSLA', name: 'Tesla, Inc.' },
            { symbol: 'AAPL', name: 'Apple Inc.' },
            { symbol: 'NVDA', name: 'Nvidia Corp' }
        ];

        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) { 
                currentUser = session.user;
                document.getElementById("user-email").innerText = currentUser.email.split("@")[0];
            } else {
                currentUser = null;
                document.getElementById("user-email").innerText = "GUEST";
            }
            initChart("BINANCE:BTCUSDT");
            loadWatchlist();
        });

        function initChart(symbol) {
            tvWidget = new TradingView.widget({
              'autosize': true,
              'symbol': symbol,
              'interval': '60',
              'theme': 'dark',
              'style': '1',
              'locale': 'en',
              'container_id': 'tv_chart_container',
              'enable_publishing': false,
              'hide_side_toolbar': false,
              'allow_symbol_change': true,
              'backgroundColor': '#000000',
              'gridColor': '#0F0F11'
            });
        }

        async function loadWatchlist() {
            if (!currentUser) {
                savedSymbols = ['BTCUSDT', 'ETHUSDT', 'XAUUSD'];
            } else {
                const { data } = await _supabase.from('user_watchlists').select('symbol').eq('user_id', currentUser.id);
                savedSymbols = data ? data.map(i => i.symbol) : [];
            }
            
            // Render Watchlist
            const watchContainer = document.getElementById('watchlist-items');
            watchContainer.innerHTML = '';
            savedSymbols.forEach(symbol => {
                const row = createAssetRow(symbol, true);
                watchContainer.appendChild(row);
            });

            // Render Market List
            const marketContainer = document.getElementById('market-assets');
            marketContainer.innerHTML = '';
            MARKET_ASSETS.forEach(asset => {
                const row = createAssetRow(asset.symbol, false, asset.name);
                marketContainer.appendChild(row);
            });
            lucide.createIcons();
        }

        function createAssetRow(symbol, isWatchlist, name = '') {
            const assetData = MARKET_ASSETS.find(a => a.symbol === symbol) || { symbol, name: 'Market Asset' };
            const displayName = name || assetData.name;
            const isSaved = savedSymbols.includes(symbol);
            
            const div = document.createElement('div');
            div.className = 'asset-row';
            div.innerHTML = `
                <div class='asset-info' onclick='initChart("BINANCE:${symbol}")'>
                    <span class='asset-symbol'>${symbol}</span>
                    <span class='asset-name'>${displayName}</span>
                </div>
                <div class='asset-actions'>
                    <i data-lucide='star' class='star-btn ${isSaved ? 'active' : ''}' onclick='toggleWatchlist("${symbol}")'></i>
                </div>
            `;
            return div;
        }

        function filterAssets() {
            const query = document.getElementById('asset-search').value.toUpperCase();
            const rows = document.querySelectorAll('#market-assets .asset-row');
            rows.forEach(row => {
                const sym = row.querySelector('.asset-symbol').innerText;
                row.style.display = sym.includes(query) ? 'flex' : 'none';
            });
        }

        async function toggleWatchlist(symbol) {
            if (!currentUser) {
                alert("Login to save your watchlists.");
                return;
            }
            if (savedSymbols.includes(symbol)) {
                await _supabase.from('user_watchlists').delete().eq('user_id', currentUser.id).eq('symbol', symbol);
            } else {
                await _supabase.from('user_watchlists').insert([{ user_id: currentUser.id, symbol: symbol }]);
            }
            loadWatchlist();
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'dashboard.html';
        }

        lucide.createIcons();
    </script>
</body>
</html>
