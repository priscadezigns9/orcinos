<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurasen | Neural Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505; --text: #FFFFFF; --muted: #888888; --accent: #00FFFF; --border: rgba(0, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .auth-card {
            background: #0D0D0D; padding: 50px; border-radius: 30px; border: 1px solid var(--accent);
            width: 100%; max-width: 420px; text-align: center; box-shadow: 0 0 50px rgba(0,255,255,0.05);
        }
        .logo img { height: 65px; margin-bottom: 30px; }
        h2 { text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 900; font-size: 1.5rem; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 35px; letter-spacing: 0.5px; }
        
        .input-group { position: relative; width: 100%; margin-bottom: 15px; }
        input {
            width: 100%; padding: 18px; padding-right: 50px; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 12px; color: #FFF; outline: none; transition: 0.3s; font-size: 1rem;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center;
        }
        .toggle-password:hover { color: var(--accent); }
        .toggle-password svg { width: 20px; height: 20px; fill: currentColor; }

        .btn-auth {
            width: 100%; padding: 18px; background: var(--accent); color: #000; border: none;
            border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; margin-top: 10px; font-size: 1rem; letter-spacing: 1px;
        }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,255,255,0.2); }
        .toggle-link { margin-top: 25px; font-size: 0.85rem; color: var(--muted); cursor: pointer; display: block; }
        .toggle-link span { color: var(--accent); font-weight: 700; }
        #auth-msg { margin-top: 25px; padding: 15px; border-radius: 8px;  font-size: 0.85rem; color: #FF4444; min-height: 20px; font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo"><img src="../logos/NURASEN_DEFINITIVE_2026.png" alt="Nurasen"></div>
        <h2 id="auth-title">Neural Access</h2>
        <p id="auth-subtitle">Establish your identity to start scanning.</p>
        
        <div class="input-group">
            <input type="email" id="email" placeholder="Email Address">
        </div>
        
        <div class="input-group">
            <input type="password" id="pass" placeholder="Password">
            <div class="toggle-password" onclick="togglePasswordVisibility()">
                <svg id="eye-icon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </div>
        </div>

        <button class="btn-auth" id="auth-btn" onclick="handleAuth()">Sign Up</button>
        <div id="auth-msg"></div>
        
        <div class="toggle-link" onclick="toggleAuth()">
            <span id="toggle-text">Already have a profile? Login</span>
        </div>
        <a href="index.html" style="display:block; margin-top:35px; color:var(--muted); text-decoration:none; font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; opacity:0.6;">Return Home</a>
    </div>

    <script>
        const supabaseUrl = 'https://sazhdnqzaqpqcralmthh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        let isLogin = false;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('auth-subtitle').innerText = isLogin ? 'Access your existing profile.' : 'Create your account to start scanning.';
            document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have a profile? Sign Up" : "Already have a profile? Login";
            document.getElementById('auth-msg').innerText = "";
        }

        function togglePasswordVisibility() {
            const passInput = document.getElementById('pass');
            const eyeIcon = document.getElementById('eye-icon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.innerHTML = '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
            } else {
                passInput.type = 'password';
                eyeIcon.innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
            }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const msg = document.getElementById('auth-msg');
            
            if(!email || !password) {
                msg.innerText = "ERROR: Missing credentials";
                return;
            }

            msg.style.color = "var(--accent)";
            msg.innerText = isLogin ? 'SYNCHRONIZING...' : 'INITIALIZING HANDSHAKE...';
            
            try {
                if (isLogin) {
                    const { data, error } = await client.auth.signInWithPassword({ email, password });
                    if(error) {
                         if(error.message.includes('Invalid login credentials')) {
                             throw new Error('WRONG PASSWORD. USE THE EYE ICON TO CHECK.');
                         }
                         throw error;
                    }
                    window.location.href = 'dashboard.html';
                } else {
                    const { data, error } = await client.auth.signUp({ 
                        email, 
                        password,
                        options: {
                            emailRedirectTo: window.location.origin + '/nurasen/dashboard.html'
                        }
                    });
                    if(error) throw error;
                    if (data.user && data.session) {
                        window.location.href = 'dashboard.html';
                    } else {
                        msg.innerText = 'PROFILE ESTABLISHED. CHECK EMAIL TO CONFIRM.';
                    }
                }
            } catch (err) {
                msg.style.color = "#FF4444";
                msg.innerText = "ERROR: " + (err.message || "Failed to establish connection");
            }
        }
    </script>
</body>
</html>
