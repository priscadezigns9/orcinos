<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurasen | Secure Access</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #050505; --text: #FFFFFF; --muted: #888888; --accent: #00FFFF; --border: rgba(0, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .auth-card {
            background: #0D0D0D; padding: 50px; border-radius: 30px; border: 1px solid var(--accent);
            width: 100%; max-width: 400px; text-align: center; position: relative;
        }
        .logo img { height: 60px; margin-bottom: 30px; }
        h2 { text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: 900; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 30px; }
        
        input {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--border);
            border-radius: 10px; color: #FFF; margin-bottom: 15px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }
        
        .btn-auth {
            width: 100%; padding: 15px; background: var(--accent); color: #000; border: none;
            border-radius: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer;
            transition: 0.3s; margin-top: 10px;
        }
        .btn-auth:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0,255,255,0.2); }
        
        .toggle-link {
            margin-top: 20px; font-size: 0.8rem; color: var(--muted); cursor: pointer; display: block;
        }
        .toggle-link span { color: var(--accent); font-weight: 700; }
        
        #auth-msg { margin-top: 20px; font-size: 0.8rem; color: var(--accent); min-height: 20px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="logo"><img src="../logos/NURASEN_DEFINITIVE_2026.png" alt="Nurasen"></div>
        <h2 id="auth-title">Neural Access</h2>
        <p id="auth-subtitle">Establish your identity to start scanning.</p>
        
        <input type="email" id="email" placeholder="Pulse Address (Email)">
        <input type="password" id="pass" placeholder="Keycode">
        
        <button class="btn-auth" id="auth-btn" onclick="handleAuth()">Sign Up</button>
        
        <div id="auth-msg"></div>
        
        <div class="toggle-link" onclick="toggleAuth()">
            <span id="toggle-text">Already have a profile? Login</span>
        </div>
        
        <a href="index.html" style="display:block; margin-top:30px; color:var(--muted); text-decoration:none; font-size:0.7rem; text-transform:uppercase;">Return Home</a>
    </div>

    <script>
        const supabaseUrl = 'https://sazhdnqzaxppcralmthh.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNhemhkbnF6YXFwcWNyYWxtdGhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxNzE5NjYsImV4cCI6MjA5Mzc0Nzk2Nn0.uTyw31uWTNOTV5-HzNpm46vpAJABAsHLMzW-sYOkRhc';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let isLogin = false;

        function toggleAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? 'Resume Defense' : 'Neural Access';
            document.getElementById('auth-subtitle').innerText = isLogin ? 'Access your existing profile.' : 'Establish your identity to start scanning.';
            document.getElementById('auth-btn').innerText = isLogin ? 'Login' : 'Sign Up';
            document.getElementById('toggle-text').innerText = isLogin ? "Don't have a profile? Sign Up" : "Already have a profile? Login";
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            const msg = document.getElementById('auth-msg');
            
            if(!email || !password) {
                msg.innerText = "ERROR: Missing credentials";
                return;
            }

            msg.innerText = isLogin ? 'SYNCHRONIZING...' : 'INITIALIZING HANDSHAKE...';
            
            if (isLogin) {
                const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
                if(error) msg.innerText = 'ERROR: ' + error.message;
                else window.location.href = 'dashboard.html';
            } else {
                const { data, error } = await _supabase.auth.signUp({ email, password });
                if(error) msg.innerText = 'ERROR: ' + error.message;
                else msg.innerText = 'PROFILE ESTABLISHED. CHECK EMAIL.';
            }
        }
    </script>
</body>
</html>
